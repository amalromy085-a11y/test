<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sales Command Center — HomeGym™</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1117;--surface:#1a1d27;--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.4);--text2:rgba(255,255,255,.7);--white:#f0f2f5;--input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.1);--card-hover:rgba(255,255,255,.04);--rc:#7c3aed;--shadow:0 2px 16px rgba(0,0,0,.4);--modal-bg:rgba(0,0,0,.75)}
[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--border:rgba(0,0,0,.09);--text:rgba(0,0,0,.45);--text2:rgba(0,0,0,.7);--white:#111;--input-bg:rgba(0,0,0,.04);--input-border:rgba(0,0,0,.12);--card-hover:rgba(0,0,0,.03);--shadow:0 2px 16px rgba(0,0,0,.08);--modal-bg:rgba(0,0,0,.5)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--white);height:100dvh;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,color .3s}
input,select,button,textarea{font-family:inherit;color:var(--white)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(127,127,127,.3);border-radius:99px}
select option{background:var(--surface);color:var(--white)}

/* ─── 3D GYM BACKGROUND ─── */
#gymBg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.gym-canvas{width:100%;height:100%;position:absolute;inset:0}
#appShell{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ─── LOGIN ─── */
#loginWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;transition:opacity .5s;overflow-y:auto;background:transparent}
#loginWrap.hide{opacity:0;pointer-events:none}
.login-card{width:100%;max-width:400px;perspective:1000px}
.login-inner{animation:loginFloat 6s ease-in-out infinite}
@keyframes loginFloat{0%,100%{transform:translateY(0) rotateX(0deg)}50%{transform:translateY(-8px) rotateX(1deg)}}
.login-header{text-align:center;margin-bottom:24px}
.logo-circle{display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px;border-radius:22px;background:linear-gradient(135deg,#7c3aed,#4f46e5);margin-bottom:14px;box-shadow:0 8px 32px rgba(124,58,237,.5);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 8px 32px rgba(124,58,237,.5)}50%{box-shadow:0 8px 48px rgba(124,58,237,.9)}}
.login-header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;text-shadow:0 2px 20px rgba(124,58,237,.5)}
.login-header p{color:rgba(255,255,255,.5);font-size:12px;margin-top:4px}
.glass{background:rgba(26,29,39,.85);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);backdrop-filter:blur(20px)}
[data-theme="light"] .glass{background:rgba(255,255,255,.9);border:1px solid rgba(124,58,237,.2)}
.field-wrap{margin-bottom:12px}
.field-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 13px;color:#fff;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.field-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
[data-theme="light"] .field-input{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.12);color:#111}
.btn-main{width:100%;padding:13px;border-radius:11px;border:none;font-weight:700;font-size:14px;cursor:pointer;margin-top:12px;color:#fff;background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 4px 20px rgba(124,58,237,.4);transition:all .2s}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,.6)}
.btn-main:disabled{background:rgba(255,255,255,.1)!important;box-shadow:none!important;cursor:not-allowed;transform:none!important}
.err-msg{color:#ef4444;font-size:11px;margin-bottom:8px;display:none;padding:8px;background:rgba(239,68,68,.08);border-radius:7px;border:1px solid rgba(239,68,68,.2)}
.login-footer{color:rgba(255,255,255,.3);font-size:11px;text-align:center;margin-top:16px}
.theme-toggle-login{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(10px)}

/* ─── APP ─── */
#app{display:flex;height:100dvh;overflow:hidden;opacity:0;transition:opacity .4s;flex-direction:column}
#app.show{opacity:1}
header{background:rgba(26,29,39,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;box-shadow:0 2px 20px rgba(0,0,0,.3)}
[data-theme="light"] header{background:rgba(255,255,255,.85)}
.logo-sm{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(124,58,237,.4)}
.topbar-title{flex:1;min-width:0}
.topbar-title p{font-weight:800;font-size:14px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-title small{color:var(--text);font-size:10px}
.icon-btn{background:var(--input-bg);border:1px solid var(--input-border);border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white);transition:all .2s}
.icon-btn:hover{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:4px;padding:6px}
.ham-line{width:20px;height:2px;background:var(--white);border-radius:99px;transition:all .3s}

/* ─── DRAWER ─── */
#drawer{position:fixed;inset:0;z-index:200;pointer-events:none}
#drawerBg{position:absolute;inset:0;background:var(--modal-bg);opacity:0;transition:opacity .3s}
#drawerPanel{position:absolute;left:0;top:0;bottom:0;width:270px;background:rgba(15,17,23,.95);backdrop-filter:blur(30px);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 40px rgba(0,0,0,.5);border-right:1px solid var(--border)}
[data-theme="light"] #drawerPanel{background:rgba(255,255,255,.95)}
#drawer.open{pointer-events:all}
#drawer.open #drawerBg{opacity:1}
#drawer.open #drawerPanel{transform:translateX(0)}
.drawer-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.drawer-brand p{font-weight:800;font-size:14px;color:var(--white)}
.drawer-brand small{color:var(--text);font-size:10px}
.drawer-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;border:none;background:transparent;color:var(--text);font-weight:500;font-size:13px;cursor:pointer;transition:all .18s;text-align:left;width:100%;position:relative}
.nav-btn.active{background:rgba(124,58,237,.15);color:var(--white);font-weight:700;border:1px solid rgba(124,58,237,.25)}
.nav-dot{position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:99px;background:var(--rc);display:none}
.nav-btn.active .nav-dot{display:block}
.nav-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.drawer-foot{padding:12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--text);font-size:13px;cursor:pointer}

/* ─── MAIN ─── */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{padding:14px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ─── CARDS ─── */
.card{background:rgba(26,29,39,.8);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:15px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
[data-theme="light"] .card{background:rgba(255,255,255,.85)}
.card:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card-title{font-weight:700;font-size:13px;margin-bottom:12px;color:var(--white)}
.card+.card{margin-top:12px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-weight:700;font-size:13px;color:var(--white)}
.two-col{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px}
@media(min-width:600px){.two-col{grid-template-columns:1fr 1fr}}

/* ─── STATS ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{border-radius:16px;padding:16px;position:relative;overflow:hidden;cursor:default;transition:transform .3s,box-shadow .3s;animation:statPop .4s ease backwards}
.stat-card:nth-child(1){animation-delay:.0s}
.stat-card:nth-child(2){animation-delay:.08s}
.stat-card:nth-child(3){animation-delay:.16s}
.stat-card:nth-child(4){animation-delay:.24s}
@keyframes statPop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.stat-card:hover{transform:translateY(-3px) scale(1.02)}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12)}
.stat-card::after{content:'';position:absolute;bottom:-15px;left:-15px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.06)}
.stat-icon{font-size:22px;margin-bottom:6px;position:relative;z-index:1}
.stat-val{font-size:22px;font-weight:800;color:#fff;position:relative;z-index:1}
.stat-label{color:rgba(255,255,255,.75);font-size:11px;position:relative;z-index:1}
.stat-delta{display:inline-block;margin-top:5px;background:rgba(255,255,255,.2);border-radius:99px;padding:1px 8px;font-size:10px;color:#fff;position:relative;z-index:1}

/* ─── PILL ─── */
.pill{border-radius:99px;padding:2px 9px;font-size:10px;font-weight:600;white-space:nowrap}
.bar-track{background:var(--border);border-radius:99px;height:4px;margin-top:5px}
.bar-fill{height:4px;border-radius:99px;transition:width 1s ease}

/* ─── LEAD LIST ─── */
.lead-row{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.lead-row:hover{background:var(--card-hover)}
.list-search{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:9px;padding:8px 12px;color:var(--white);font-size:14px;outline:none}
.tab-row{display:flex;gap:5px;margin-top:7px}
.tab-btn{flex:1;padding:6px 0;background:var(--input-bg);border:1px solid var(--input-border);border-radius:7px;color:var(--text);font-size:11px;cursor:pointer;transition:all .15s}
.tab-btn.active-tab{background:var(--rc);color:#fff;border-color:var(--rc)}
.lead-item{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.lead-item:active{background:var(--card-hover)}
.plat-dot{position:absolute;bottom:0;right:0;font-size:8px}

/* ─── CHAT ─── */
.chat-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(26,29,39,.9);backdrop-filter:blur(20px);flex-shrink:0}
[data-theme="light"] .chat-head{background:rgba(255,255,255,.9)}
.chat-back{background:none;border:none;color:var(--white);font-size:20px;cursor:pointer;padding:4px}
.chat-name{font-weight:700;font-size:13px;color:var(--white)}
.chat-sub{color:var(--text);font-size:10px}
.chat-hactions{margin-left:auto;display:flex;gap:6px;align-items:center}
.action-btn{background:var(--input-bg);border:1px solid var(--input-border);border-radius:7px;padding:5px 10px;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg-bubble{max-width:75%;padding:9px 12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg-time{font-size:9px;color:rgba(127,127,127,.5);text-align:right;margin-top:3px}
.msg-out{border-radius:16px 16px 4px 16px;margin-left:auto;color:#fff}
.msg-in{border-radius:16px 16px 16px 4px;background:var(--input-bg);color:var(--white)}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;background:rgba(26,29,39,.9);backdrop-filter:blur(20px)}
[data-theme="light"] .chat-input-row{background:rgba(255,255,255,.9)}
.msg-input{flex:1;background:var(--input-bg);border:1px solid var(--input-border);border-radius:9px;padding:9px 12px;color:var(--white);font-size:14px;outline:none}
.send-btn{border:none;border-radius:9px;padding:9px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0}

/* ─── DETAIL SHEET ─── */
.detail-sheet{position:fixed;inset:0;z-index:150;pointer-events:none}
.detail-bg{position:absolute;inset:0;background:var(--modal-bg);opacity:0;transition:opacity .3s}
.detail-panel{position:absolute;left:0;right:0;bottom:0;background:rgba(15,17,23,.97);backdrop-filter:blur(30px);border-radius:20px 20px 0 0;max-height:85dvh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));border-top:1px solid var(--border)}
[data-theme="light"] .detail-panel{background:rgba(255,255,255,.97)}
.detail-sheet.open{pointer-events:all}
.detail-sheet.open .detail-bg{opacity:1}
.detail-sheet.open .detail-panel{transform:translateY(0)}
.detail-handle{width:36px;height:4px;border-radius:99px;background:var(--border);margin:0 auto 16px}
.detail-block{background:var(--input-bg);border-radius:9px;padding:9px 11px;margin-bottom:7px}
.detail-key{color:var(--text);font-size:10px;margin-bottom:2px}
.detail-val{font-size:12px;font-weight:600;color:var(--white)}
.ghost-btn{width:100%;padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:7px;background:transparent;border:none}

/* ─── PIPELINE ─── */
.pipeline-wrap{padding:14px;overflow-x:auto;animation:fadeUp .3s ease;user-select:none}
.kanban{display:flex;gap:12px;min-width:max-content;align-items:flex-start;padding-bottom:8px}
.col-wrap{width:210px;flex-shrink:0}
.col-inner{border-radius:14px;border:1.5px solid var(--border);background:rgba(26,29,39,.7);backdrop-filter:blur(10px);overflow:hidden;transition:border-color .2s,box-shadow .2s}
[data-theme="light"] .col-inner{background:rgba(255,255,255,.8)}
.col-inner.drag-over{border-color:var(--rc);box-shadow:0 0 20px rgba(124,58,237,.3)}
.col-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.col-dot{width:7px;height:7px;border-radius:50%;margin-right:6px;flex-shrink:0}
.col-title{font-weight:700;font-size:11px;display:flex;align-items:center;color:var(--white)}
.col-count{background:var(--input-bg);border-radius:99px;padding:1px 7px;font-size:10px;color:var(--text)}
.col-body{padding:8px;min-height:80px;display:flex;flex-direction:column;gap:6px}
.k-card{background:rgba(30,33,48,.9);border:1.5px solid var(--border);border-radius:12px;padding:11px;cursor:grab;transition:box-shadow .2s,transform .2s,opacity .2s;position:relative}
[data-theme="light"] .k-card{background:rgba(255,255,255,.95)}
.k-card:hover{border-color:rgba(124,58,237,.4);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.k-card.dragging{opacity:.35;transform:scale(.96)}
.k-card-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.k-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--white);flex:1}
.k-val{color:#16a34a;font-size:13px;font-weight:800;margin:3px 0}
.k-src{color:var(--text);font-size:10px}
.k-reminder{font-size:10px;margin-top:5px;padding:3px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
.k-actions{display:flex;gap:4px;margin-top:8px}
.k-act-btn{flex:1;border:none;border-radius:7px;padding:5px 0;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.drop-zone{border:1.5px dashed var(--border);border-radius:10px;min-height:60px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:11px;opacity:.5;transition:all .2s}
.drop-zone.active{border-color:var(--rc);opacity:1;background:rgba(124,58,237,.05);color:var(--rc)}

/* ─── REMINDER POPUP ─── */
.reminder-popup{position:fixed;top:20px;right:20px;z-index:500;background:rgba(15,17,23,.97);backdrop-filter:blur(20px);border:1px solid rgba(124,58,237,.4);border-radius:16px;padding:16px 20px;max-width:320px;box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 1px rgba(124,58,237,.2);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
[data-theme="light"] .reminder-popup{background:rgba(255,255,255,.97)}
@keyframes popIn{from{opacity:0;transform:translateX(40px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
.reminder-popup-title{font-weight:700;font-size:14px;color:var(--white);margin-bottom:4px}
.reminder-popup-sub{color:var(--text);font-size:12px;margin-bottom:10px}
.reminder-popup-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text);font-size:16px;cursor:pointer}

/* ─── AGENTS ─── */
.agent-grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px;animation:fadeUp .3s ease}
@media(min-width:500px){.agent-grid{grid-template-columns:1fr 1fr}}
.agent-card{background:rgba(26,29,39,.8);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow);transition:transform .2s}
[data-theme="light"] .agent-card{background:rgba(255,255,255,.85)}
.agent-card:hover{transform:translateY(-2px)}
.agent-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.agent-conv{margin-left:auto;text-align:right}
.agent-conv-val{font-size:22px;font-weight:800;color:#16a34a}
.agent-conv-lbl{font-size:10px;color:var(--text)}
.agent-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.agent-stat{background:var(--input-bg);border-radius:8px;padding:8px 0;text-align:center}
.agent-stat-val{font-weight:700;font-size:12px;color:var(--white)}
.agent-stat-key{color:var(--text);font-size:10px}

/* ─── LEADERBOARD PODIUM ─── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:16px;padding:16px 0 0}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:100px}
.podium-av{position:relative}
.podium-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:18px;animation:crownBounce 2s ease-in-out infinite}
@keyframes crownBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.podium-name{font-size:11px;font-weight:700;color:var(--white);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
.podium-conv{font-size:12px;font-weight:800}
.podium-bar{width:100%;border-radius:8px 8px 0 0;transition:height 1s cubic-bezier(.34,1.56,.64,1)}
.lb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:7px 10px;border-radius:9px;background:var(--input-bg)}

/* ─── FOLLOWUPS ─── */
.fu-counters{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.fu-counter{background:rgba(26,29,39,.8);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);transition:transform .2s}

  }
  for(let i=0;i<12;i++){
    weights.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*400+100,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.1,vz:(Math.random()-.5)*.4,r:12+Math.random()*20,alpha:Math.random()*.12+.03});
  }
  for(let i=0;i<40;i++){
    particles.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*600,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.2,vz:(Math.random()-.5)*.8,r:1+Math.random()*2,alpha:Math.random()*.3+.05});
  }
  function project(x,y,z){
    const fov=500;const cx=W/2,cy=H/2;
    const scale=fov/(fov+z);
    return{px:cx+(x-cx)*scale,py:cy+(y-cy)*scale,scale};
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Deep space gradient
    const isDark=darkMode;
    if(isDark){
      const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/1.4);
      grad.addColorStop(0,"rgba(20,10,40,.85)");grad.addColorStop(.5,"rgba(10,5,25,.9)");grad.addColorStop(1,"rgba(5,0,15,.95)");
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    } else {
      const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/1.4);
      grad.addColorStop(0,"rgba(240,240,255,.7)");grad.addColorStop(1,"rgba(200,200,230,.8)");
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    }
    // Grid floor
    ctx.save();ctx.globalAlpha=isDark?.06:.04;ctx.strokeStyle=isDark?"#7c3aed":"#4f46e5";ctx.lineWidth=1;
    const gSize=60;const vanY=H*.45;
    for(let gx=-20;gx<=20;gx++){
      const x=W/2+gx*gSize;ctx.beginPath();ctx.moveTo(x,vanY);ctx.lineTo(x<W/2?-200:W+200,H+100);ctx.stroke();
    }
    for(let gy=0;gy<12;gy++){
      const t=gy/12;const y=vanY+(H+100-vanY)*t;
      const xSpread=200+gy*100;
      ctx.beginPath();ctx.moveTo(W/2-xSpread,y);ctx.lineTo(W/2+xSpread,y);ctx.stroke();
    }
    ctx.restore();
    // Barbell bars (3D)
    bars.forEach(b=>{
      b.x+=b.vx;b.y+=b.vy;b.z+=b.vz;
      if(b.x<-200||b.x>W+200)b.vx*=-1;
      if(b.y<-100||b.y>H+100)b.vy*=-1;
      if(b.z<50||b.z>700)b.vz*=-1;
      const{px,py,scale}=project(b.x,b.y,b.z);
      const w=b.w*scale,h=b.h*scale;
      ctx.save();ctx.globalAlpha=b.alpha;
      // Bar body
      const barGrad=ctx.createLinearGradient(px-w/2,py-h/2,px-w/2,py+h/2);
      barGrad.addColorStop(0,"rgba(180,180,200,.9)");barGrad.addColorStop(.5,"rgba(220,220,240,1)");barGrad.addColorStop(1,"rgba(140,140,160,.7)");
      ctx.fillStyle=barGrad;ctx.fillRect(px-w/2,py-h/2,w,h);
      // Weight plates
      [-w*.42,w*.42].forEach(ox=>{
        const pw=h*1.4,pd=h*3;
        const plateGrad=ctx.createLinearGradient(px+ox-pw/2,py-pd/2,px+ox+pw/2,py+pd/2);
        plateGrad.addColorStop(0,"rgba(80,80,100,.9)");plateGrad.addColorStop(.5,"rgba(100,100,120,1)");plateGrad.addColorStop(1,"rgba(60,60,80,.8)");
        ctx.fillStyle=plateGrad;ctx.fillRect(px+ox-pw/2,py-pd/2,pw,pd);
        // Inner circle
        ctx.beginPath();ctx.arc(px+ox,py,pd*.2,0,Math.PI*2);ctx.fillStyle="rgba(50,50,70,.8)";ctx.fill();
      });
      ctx.restore();
    });
    // Weight plates floating
    weights.forEach(w=>{
      w.x+=w.vx;w.y+=w.vy;w.z+=w.vz;
      if(w.x<-100||w.x>W+100)w.vx*=-1;
      if(w.y<-100||w.y>H+100)w.vy*=-1;
      if(w.z<50||w.z>600)w.vz*=-1;
      const{px,py,scale}=project(w.x,w.y,w.z);
      const r=w.r*scale;
      ctx.save();ctx.globalAlpha=w.alpha;
      ctx.beginPath();ctx.ellipse(px,py,r,r*.3,0,0,Math.PI*2);
      const wGrad=ctx.createRadialGradient(px,py,0,px,py,r);
      wGrad.addColorStop(0,"rgba(180,160,220,.9)");wGrad.addColorStop(.6,"rgba(100,80,160,.7)");wGrad.addColorStop(1,"rgba(60,40,100,.4)");
      ctx.fillStyle=wGrad;ctx.fill();
      ctx.strokeStyle="rgba(200,180,255,.3)";ctx.lineWidth=1;ctx.stroke();
      // Center hole
      ctx.beginPath();ctx.ellipse(px,py,r*.25,r*.08,0,0,Math.PI*2);ctx.fillStyle="rgba(10,5,20,.8)";ctx.fill();
      ctx.restore();
    });
    // Glowing particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      if(p.z<0||p.z>600)p.vz*=-1;
      const{px,py,scale}=project(p.x,p.y,p.z);
      ctx.save();ctx.globalAlpha=p.alpha;
      ctx.beginPath();ctx.arc(px,py,p.r*scale,0,Math.PI*2);
      ctx.fillStyle=isDark?"rgba(160,120,255,1)":"rgba(100,80,200,1)";
      ctx.shadowBlur=8;ctx.shadowColor=isDark?"rgba(120,80,255,1)":"rgba(100,80,200,.8)";
      ctx.fill();ctx.restore();
    });
    raf=requestAnimationFrame(draw);
  }
  draw();
})();

/* ══ LISTENERS ══ */
function startListeners(){
  unsubLeads=COL.leads().orderBy("createdAt","desc").onSnapshot(snap=>{leads=snap.docs.map(d=>({id:d.id,...d.data()}));if(!chatView)safeRender(["dashboard","inbox","pipeline"]);});
  unsubAgents=COL.agents().orderBy("createdAt").onSnapshot(snap=>{agents=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["agents","dashboard"]);});
  unsubTasks=COL.tasks().orderBy("createdAt","desc").onSnapshot(snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["followups"]);});
  unsubTemplates=COL.templates().orderBy("createdAt").onSnapshot(snap=>{templates=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["templates"]);});
  unsubAutos=COL.autos().orderBy("createdAt").onSnapshot(snap=>{autos=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["automation"]);});
  unsubCampaigns=COL.campaigns().orderBy("createdAt","desc").onSnapshot(snap=>{campaigns=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["campaigns"]);});
  unsubReminders=COL.reminders().orderBy("createdAt","desc").onSnapshot(snap=>{reminders=snap.docs.map(d=>({id:d.id,...d.data()}));safeRender(["reminders"]);checkTodayReminders();});
  unsubStages=COL.stages().orderBy("order").onSnapshot(snap=>{
    if(!snap.empty){
      stages=snap.docs.map(d=>d.data().name);
      stageColors={};snap.docs.forEach(d=>{stageColors[d.data().name]=d.data().color;});
    }
    safeRender(["pipeline","dashboard"]);
  });
}
function stopListeners(){[unsubLeads,unsubAgents,unsubTasks,unsubTemplates,unsubAutos,unsubCampaigns,unsubMessages,unsubReminders,unsubStages].forEach(u=>u&&u());}
function safeRender(pages){if(pages.includes(curPage))renderPage(curPage);}

      <button onclick="dismissReminder('${r.id}')" style="flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text2);font-size:12px;cursor:pointer">Dismiss</button>

async function dismissReminder(id){

/* ══ AUTH ══ */
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      const docRef=COL.users().doc(user.uid);const snap=await docRef.get();
      if(snap.exists){
        const d=snap.data();currentUser={uid:user.uid,email:user.email,name:d.name||user.email,role:d.role||"agent"};selectedRole=currentUser.role;initApp();
      } else {
        const all=await COL.users().limit(1).get();
        if(all.empty){
          const name=user.email.split("@")[0];
          await docRef.set({name,email:user.email,role:"admin",createdAt:new Date().toISOString()});
          currentUser={uid:user.uid,email:user.email,name,role:"admin"};selectedRole="admin";
          initApp();setTimeout(()=>showToast("👑 First login — you are Admin!",5000),800);
        } else {
          await auth.signOut();showLoginScreen();showErrMsg("No account found. Contact your admin.");
        }
      }
    } catch(e){await auth.signOut();showLoginScreen();showErrMsg("Error: "+e.message);}
  } else {showLoginScreen();}
});
function showLoginScreen(){
  stopListeners();
  $("appShell").style.display="none";$("app").style.opacity="0";$("app").classList.remove("show");
  $("loginWrap").style.display="flex";$("loginWrap").classList.remove("hide");
  const btn=$("signInBtn");if(btn){btn.textContent="Sign In →";btn.disabled=false;}
}
function showErrMsg(msg){const e=$("errMsg");if(e){e.style.display="block";e.textContent=msg;}}
async function doLogin(){
  const email=($("emailInput").value||"").trim(),pass=$("passInput").value||"";
  if(!email||!pass){showErrMsg("Please enter email and password.");return;}
  const btn=$("signInBtn");btn.innerHTML=`<span class="spinner"></span>Signing in…`;btn.disabled=true;
  $("errMsg").style.display="none";
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){
    const msgs={"auth/user-not-found":"No account with this email.","auth/wrong-password":"Incorrect password.","auth/invalid-email":"Invalid email.","auth/too-many-requests":"Too many attempts.","auth/invalid-credential":"Invalid email or password."};
    showErrMsg(msgs[e.code]||"Login failed: "+e.message);btn.textContent="Sign In →";btn.disabled=false;
  }
}
async function doLogout(){
  $("app").style.opacity="0";stopListeners();
  leads=[];agents=[];tasks=[];templates=[];autos=[];campaigns=[];managedUsers=[];reminders=[];
  currentUser=null;selectedRole=null;selectedLead=null;chatView=false;
  await auth.signOut();
}

function pgDashboard(el){
  const closed=leads.filter(l=>l.status==="Closed");

  const revenue=closed.reduce((s,l)=>s+Number(l.value||0),0);
  const showRev=selectedRole==="admin";
  const stats=[
    {label:"Total Leads",val:leads.length,delta:"All time",icon:"👥",a:"#6366f1",b:"#4f46e5"},
    {label:"Closed Deals",val:closed.length,delta:"Converted",icon:"🎯",a:"#16a34a",b:"#15803d"},
    {label:"Conversion",val:conv+"%",delta:"Rate",icon:"📈",a:"#0ea5e9",b:"#0284c7"},
    {label:"Revenue",val:showRev?fmtCur(revenue):"🔒",delta:showRev?"Total closed":"Admin only",icon:"💰",a:"#f97316",b:"#ea580c"},

    ag._realConv=agLeads.length?Math.round(agClosed/agLeads.length*100):ag.conv||0;

    ag._rev=agLeads.filter(l=>l.status==="Closed").reduce((s,l)=>s+Number(l.value||0),0);
  });
  const topAgents=[...agents].sort((a,b)=>(b._realConv||0)-(a._realConv||0)).slice(0,5);

    <div class="stat-grid">${stats.map(s=>`<div class="stat-card" style="background:linear-gradient(135deg,${s.a},${s.b});box-shadow:0 4px 20px ${s.a}44"><div class="stat-icon">${s.icon}</div><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div><span class="stat-delta">${s.delta}</span></div>`).join("")}</div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">🏆 Leaderboard</div>

              <div class="podium-av" style="order:-1">
                ${i===1?`<div class="podium-crown">👑</div>`:""}
                ${av(initials(ag.name),i===1?44:36,i===0?"#94a3b8,#6b7280":i===1?"#f59e0b,#f97316":"#f97316,#ea580c")}
              </div>
              <div class="podium-name">${ag.name}</div>
              <div class="podium-conv" style="color:${podiumColors[ranks[i]-1]}">${ag._realConv}%</div>
              <div class="podium-bar" style="height:${heights[i]}px;background:linear-gradient(to top,${podiumColors[ranks[i]-1]},${podiumColors[ranks[i]-1]}55)"></div>
            </div>`;
          }).join("")}

        ${topAgents.map((ag,i)=>`

function renderLeadList(arr){

      </div>

function renderChatView(){
  const sl=selectedLead;
  const sc=stageColors[sl.status]||DEFAULT_STAGE_COLORS[sl.status]||rc();
  return `<div class="chat-view" style="height:100%;overflow:hidden">
    <div class="chat-head">
      <button class="chat-back" onclick="chatView=false;renderPage('inbox')">‹</button>
      ${av(initials(sl.name),34)}

      <div class="chat-hactions">
        <button class="action-btn" onclick="showAddReminderModal('${sl.id}','${sl.name}')">🔔</button>
        <button class="action-btn" onclick="showEditLeadModal('${sl.id}')">✏️</button>
        <button class="action-btn" onclick="openDetailSheet('${sl.id}')">⋯</button>

      </div>

      <button style="background:var(--input-bg);border:1px solid var(--input-border);border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:14px;flex-shrink:0" onclick="showTemplatePicker('${sl.id}')">📋</button>
      <input id="msgInput" class="msg-input" placeholder="Message…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" style="background:linear-gradient(135deg,${rc()},${rc()}bb)" onclick="sendMsg()">Send</button>
    </div>
  </div>`;

function loadChatMessages(lid){
  if(unsubMessages)unsubMessages();
  unsubMessages=COL.messages(lid).orderBy("createdAt").onSnapshot(snap=>{
    const box=$("chatMsgs");if(!box)return;
    const msgs=snap.docs.map(d=>d.data());
    const sl=leads.find(l=>l.id===lid)||selectedLead;
    const noteHtml=sl&&sl.notes?`<div style="text-align:center;margin-bottom:8px"><span style="background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2);border-radius:99px;padding:3px 12px;font-size:11px">📌 ${sl.notes}</span></div>`:"";
    box.innerHTML=noteHtml+(msgs.length?msgs.map(m=>`<div style="display:flex;justify-content:${m.from==="agent"?"flex-end":"flex-start"}"><div class="msg-bubble ${m.from==="agent"?"msg-out":"msg-in"}" style="${m.from==="agent"?`background:linear-gradient(135deg,${rc()},${rc()}cc)`:""}"> ${m.text}<div class="msg-time">${m.time||""}</div></div></div>`).join(""):`<div style="text-align:center;color:var(--text);padding:40px 20px;font-size:13px">No messages yet.</div>`);
    box.scrollTop=box.scrollHeight;
  });
}
function selectLead(id){selectedLead=leads.find(l=>l.id===id)||null;chatView=true;renderPage("inbox");}
async function sendMsg(){
  const inp=$("msgInput");if(!inp||!inp.value.trim()||!selectedLead)return;
  const text=inp.value.trim();inp.value="";
  try{await COL.messages(selectedLead.id).add({from:"agent",text,time:nowT(),createdAt:new Date().toISOString(),senderName:currentUser.name});}
  catch(e){showToast("❌ "+e.message);}
}
function filterLeads(val){const my=selectedRole==="agent"?leads.filter(l=>l.agentName===currentUser.name):leads;const li=$("leadItems");if(li)li.innerHTML=renderLeadList(val?my.filter(l=>l.name.toLowerCase().includes(val.toLowerCase())||(l.phone&&l.phone.includes(val))):my);}
function filterPlatform(plat,btn){document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active-tab"));btn.classList.add("active-tab");const my=selectedRole==="agent"?leads.filter(l=>l.agentName===currentUser.name):leads;const li=$("leadItems");if(li)li.innerHTML=renderLeadList(plat==="all"?my:my.filter(l=>l.platform===plat));}

  try{await COL.leads().add(data);closeModal();showToast(`✅ "${name}" added`);}catch(e){showToast("❌ "+e.message);}

  const data={name,phone:$("lp").value||"",instagram:$("lig").value||"",source:$("ls").value,platform:$("lpl").value,agentName:$("lag").value||"Unassigned",value:Number($("lv").value)||0,status:$("lst").value,notes:$("lnotes").value||"",updatedAt:new Date().toISOString()};

async function addReminder(lid,lname){

  }catch(e){showToast("❌ "+e.message);}

function pgReminders(el){
  const ts=todayStr();
  const today_r=reminders.filter(r=>!r.dismissed&&r.date===ts);
  const upcoming=reminders.filter(r=>!r.dismissed&&r.date>ts).sort((a,b)=>a.date.localeCompare(b.date));
  const past=reminders.filter(r=>!r.dismissed&&r.date<ts);
  const dismissed=reminders.filter(r=>r.dismissed);
  el.innerHTML=`<div class="page">
    <div class="fu-counters">
      <div class="fu-counter"><div class="fu-num" style="color:#ef4444">${today_r.length}</div><div class="fu-lbl">Today</div></div>
      <div class="fu-counter"><div class="fu-num" style="color:#7c3aed">${upcoming.length}</div><div class="fu-lbl">Upcoming</div></div>
      <div class="fu-counter"><div class="fu-num" style="color:#f59e0b">${past.length}</div><div class="fu-lbl">Overdue</div></div>
    </div>
    <div class="card">
      <div class="section-head">
        <div class="section-title">🔔 All Reminders</div>
        <button onclick="showModal('<div class=modal><div class=modal-handle></div><div class=modal-title>🔔 New Reminder</div><div class=form-row><label>LEAD NAME</label><input id=rln list=rleadNames placeholder=Lead name/><datalist id=rleadNames>${leads.map(l=>`<option value=\\'${l.name}\\'>`).join("")}</datalist></div><div class=form-row><label>DATE *</label><input id=rdate type=date value=${todayStr()}/></div><div class=form-row><label>NOTE</label><input id=rnote placeholder=Follow up note/></div><div class=modal-footer><button class=btn-cancel onclick=closeModal()>Cancel</button><button class=btn-save onclick=addReminderManual()>Set 🔔</button></div></div>')" style="background:${rc()};border:none;border-radius:8px;padding:7px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">+ Add</button>
      </div>
      ${[...today_r,...past,...upcoming].length?[...today_r.map(r=>({...r,_tag:"today"})),...past.map(r=>({...r,_tag:"overdue"})),...upcoming.map(r=>({...r,_tag:"upcoming"}))].map(r=>{
        const tagC=r._tag==="today"?"#ef4444":r._tag==="overdue"?"#f59e0b":"#7c3aed";
        const tagL=r._tag==="today"?"🔴 Today":r._tag==="overdue"?"🟡 Overdue":"🟣 "+r.date;
        return `<div class="task-item">
          <div style="width:8px;height:8px;border-radius:50%;background:${tagC};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div class="task-lead">${r.leadName||"Lead"}</div>
            <div class="task-info">${r.note||"—"} · <span style="color:${tagC}">${tagL}</span></div>
          </div>
          <div class="task-actions">
            <button class="task-btn" style="background:${rc()}18;color:${rc()};border:1px solid ${rc()}33" onclick="dismissReminder('${r.id}');safeRender(['reminders'])">✓</button>
            <button class="task-btn" style="background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2)" onclick="deleteReminderDoc('${r.id}')">🗑</button>
          </div>
        </div>`;
      }).join(""):`<div style="text-align:center;padding:24px;color:var(--text)"><div style="font-size:32px;margin-bottom:8px">🔔</div><p>No reminders yet</p></div>`}
    </div>
    ${dismissed.length?`<div class="card"><div class="card-title" style="color:var(--text)">✓ Dismissed (${dismissed.length})</div>${dismissed.slice(0,5).map(r=>`<div class="task-item" style="opacity:.5"><div style="flex:1;min-width:0"><div class="task-lead" style="text-decoration:line-through">${r.leadName||"Lead"}</div><div class="task-info">${r.date} · ${r.note||""}</div></div><button class="task-btn" style="background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2)" onclick="deleteReminderDoc('${r.id}')">🗑</button></div>`).join("")}</div>`:""}
  </div>`;
}
async function addReminderManual(){
  const lname=($("rln")?$("rln").value:""),date=$("rdate").value,note=($("rnote")?$("rnote").value:"");
  const lead=leads.find(l=>l.name===lname);

async function deleteReminderDoc(id){

}

let dragLead2=null;
function pgPipeline(el){
  const grouped={};stages.forEach(s=>grouped[s]=[]);
  leads.forEach(l=>{if(grouped[l.status])grouped[l.status].push(l);else{if(!grouped["Other"])grouped["Other"]=[];grouped["Other"].push(l);}});
  el.innerHTML=`<div class="pipeline-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="color:var(--text);font-size:11px">← Scroll · Drag cards to move stages</span>
      ${selectedRole==="admin"?`<div style="display:flex;gap:7px"><button onclick="showAddStageModal()" style="background:${rc()};border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">+ Stage</button><button onclick="showManageStagesModal()" style="background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;padding:6px 12px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">⚙ Manage</button></div>`:""}
    </div>
    <div class="kanban">
      ${stages.map(col=>{const sc=stageColors[col]||DEFAULT_STAGE_COLORS[col]||"#666";return `
        <div class="col-wrap">
          <div class="col-inner" id="col-${col.replace(/[^a-z0-9]/gi,'-')}"
            ondragover="pipeOver(event,'${col}')"
            ondragleave="pipeLeave(event)"
            ondrop="pipeDrop(event,'${col}')">
            <div class="col-head">

function pipeStart(e,id,fromCol){dragLead2={id,fromCol};document.getElementById("kcard-"+id)?.classList.add("dragging");e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",id);}
function pipeEnd(e){dragLead2=null;document.querySelectorAll(".k-card").forEach(c=>c.classList.remove("dragging"));document.querySelectorAll(".col-inner").forEach(c=>c.classList.remove("drag-over"));document.querySelectorAll(".drop-zone").forEach(c=>c.classList.remove("active"));}
function pipeOver(e,col){e.preventDefault();if(!dragLead2||dragLead2.fromCol===col)return;document.querySelectorAll(".col-inner").forEach(c=>c.classList.remove("drag-over"));document.getElementById("col-"+col.replace(/[^a-z0-9]/gi,"-"))?.classList.add("drag-over");}
function pipeLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove("drag-over");}
async function pipeDrop(e,toCol){
  e.preventDefault();document.querySelectorAll(".col-inner").forEach(c=>c.classList.remove("drag-over"));
  if(!dragLead2||dragLead2.fromCol===toCol){dragLead2=null;return;}
  const{id}=dragLead2;dragLead2=null;
  try{await COL.leads().doc(id).update({status:toCol});showToast(`✅ Moved to ${toCol}`);}catch(e){showToast("❌ "+e.message);}
}

async function addCustomStage(){

  try{
    await COL.stages().add({name,color,order:stages.length,createdAt:new Date().toISOString()});
    closeModal();showToast(`✅ Stage "${name}" added`);
  }catch(e){showToast("❌ "+e.message);}

async function deleteCustomStage(docId,name){

async function createUser(){
  const name=($("un").value||"").trim(),email=($("ue").value||"").trim(),pw=$("upw").value,role=$("ur").value;
  if(!name||!email||!pw){showToast("Fill all fields");return;}
  if(pw.length<6){showToast("Password must be 6+ characters");return;}
  const btn=$("createUserBtn");btn.innerHTML=`<span class="spinner"></span>Creating…`;btn.disabled=true;
  try{
    let secApp;try{secApp=firebase.app("secondary");}catch(e){secApp=firebase.initializeApp(firebaseConfig,"secondary");}
    const cred=await secApp.auth().createUserWithEmailAndPassword(email,pw);
    await COL.users().doc(cred.user.uid).set({name,email,role,createdBy:currentUser.uid,createdAt:new Date().toISOString()});
    await secApp.auth().signOut();
    closeModal();showToast(`✅ Account created for ${name}`,4000);pgSettings($("mainContent"));
  }catch(e){const msgs={"auth/email-already-in-use":"Email already exists.","auth/invalid-email":"Invalid email.","auth/weak-password":"Password too weak."};showToast("❌ "+(msgs[e.code]||e.message));btn.textContent="Create Account";btn.disabled=false;}
}

      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" style="background:#ef4444" id="removeUserBtn" onclick="removeUser('${uid2}')">Yes, Remove</button>
    </div>
  </div>`);
}
async function removeUser(uid2){
  const btn=$("removeUserBtn");btn.innerHTML=`<span class="spinner"></span>Removing…`;btn.disabled=true;
  try{await COL.users().doc(uid2).delete();managedUsers=managedUsers.filter(u=>u.uid!==uid2);closeModal();showToast("✅ User removed",4000);pgSettings($("mainContent"));}
  catch(e){showToast("❌ Failed: "+e.message);btn.textContent="Yes, Remove";btn.disabled=false;}
}
</script>
</body>
