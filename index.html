<style>
:root{
  --bg:#0b0b0b;--surface:#141414;--card:#1c1c1c;--border:#272727;--border2:#333;
  --text:#f0f0eb;--muted:#888;--muted2:#555;
  --accent:#d4ff00;--accent-dim:rgba(212,255,0,0.1);
  --green:#00e676;--green-dim:rgba(0,230,118,0.12);
  --red:#ff4444;--red-dim:rgba(255,68,68,0.12);
  --yellow:#ffbb00;--yellow-dim:rgba(255,187,0,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --purple:#aa66ff;--purple-dim:rgba(170,102,255,0.12);
  --orange:#ff8c00;--orange-dim:rgba(255,140,0,0.12);
  --pink:#ff69b4;--pink-dim:rgba(255,105,180,0.12);
  --sw:250px;
}
body.light-theme{
  --bg:#f4f4f0;--surface:#ffffff;--card:#fafafa;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#1a1a1a;--muted:#666;--muted2:#999;
  --accent:#5a9e00;--accent-dim:rgba(90,158,0,0.1);
  --green:#00a050;--green-dim:rgba(0,160,80,0.12);
  --red:#cc2222;--red-dim:rgba(204,34,34,0.12);
  --yellow:#cc8800;--yellow-dim:rgba(204,136,0,0.12);
  --blue:#2266cc;--blue-dim:rgba(34,102,204,0.12);
  --purple:#7733cc;--purple-dim:rgba(119,51,204,0.12);
  --orange:#cc5500;--orange-dim:rgba(204,85,0,0.12);
  --pink:#cc3377;--pink-dim:rgba(204,51,119,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.out{opacity:0;pointer-events:none}
.ld-logo{width:80px;height:80px;object-fit:contain;margin-bottom:20px;animation:ldpulse 1.4s ease-in-out infinite}
.ld-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;margin-bottom:24px;color:var(--text)}
.ld-bar{width:180px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);animation:ldfill 1.6s ease forwards}
@keyframes ldpulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ldfill{from{width:0}to{width:100%}}
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 80% 10%,rgba(212,255,0,.06) 0,transparent 60%),
             radial-gradient(ellipse 50% 70% at 5% 90%,rgba(77,159,255,.05) 0,transparent 60%),var(--bg)}
.lc{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.3)}
.lc-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.lc-logo img{width:48px;height:48px;object-fit:contain;border-radius:10px}
.lc-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1}
.lc-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase}
.lc h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:4px}
.lc p{color:var(--muted);font-size:13px;margin-bottom:28px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi,.fs,.fta{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent)}
.fs option{background:var(--surface)}
.fta{resize:vertical;min-height:76px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert-err{background:var(--red-dim);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.alert-ok{background:var(--green-dim);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-gr{background:var(--green);color:#000}.btn-gr:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-w{width:100%}
.btn-yw{background:var(--yellow);color:#000}
.btn-or{background:var(--orange);color:#fff}
.btn-pu{background:var(--purple);color:#fff}
.btn-bl{background:var(--blue);color:#fff}
.btn-pk{background:var(--pink);color:#fff}
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .28s;overflow:hidden}
.sb-head{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:36px;height:36px;object-fit:contain;border-radius:8px;flex-shrink:0}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.8px;line-height:1.2}
.sb-brand small{display:block;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ua{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:2px}
.r-admin{background:var(--purple-dim);color:var(--purple)}
.r-coordinator{background:var(--blue-dim);color:var(--blue)}
.r-coordinatorhead{background:var(--orange-dim);color:var(--orange)}
.r-trainer{background:var(--green-dim);color:var(--green)}
.r-client{background:var(--yellow-dim);color:var(--yellow)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.nav-sec{padding:0 16px;margin-top:4px}
.nav-sec-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:8px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:rgba(128,128,128,.08);color:var(--text)}
.ni.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bg)}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;position:sticky;top:0;z-index:50;gap:14px}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;flex:1}
.tb-date{font-size:12px;color:var(--muted)}
.notif-btn,.theme-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:7px 9px;cursor:pointer;color:var(--text);font-size:14px;transition:border-color .2s;position:relative}
.notif-btn:hover,.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%}
.mob-menu{display:none;background:transparent;border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:7px;cursor:pointer;font-size:17px}
.page{padding:22px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;letter-spacing:.3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-a::before{background:var(--accent)}.sc-g::before{background:var(--green)}.sc-r::before{background:var(--red)}.sc-b::before{background:var(--blue)}.sc-p::before{background:var(--purple)}.sc-y::before{background:var(--yellow)}.sc-o::before{background:var(--orange)}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1}
.sc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.sc-ico{position:absolute;right:14px;top:14px;font-size:24px;opacity:.12}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(128,128,128,.04)}
tbody td{padding:11px 13px;border-bottom:1px solid rgba(128,128,128,.06);vertical-align:middle}
tbody tr:hover{background:rgba(128,128,128,.04)}
tbody tr:last-child td{border-bottom:none}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.b-g{background:var(--green-dim);color:var(--green)}.b-y{background:var(--yellow-dim);color:var(--yellow)}.b-r{background:var(--red-dim);color:var(--red)}.b-b{background:var(--blue-dim);color:var(--blue)}.b-p{background:var(--purple-dim);color:var(--purple)}.b-gray{background:rgba(128,128,128,.12);color:var(--muted)}.b-a{background:var(--accent-dim);color:var(--accent)}.b-o{background:var(--orange-dim);color:var(--orange)}.b-pk{background:var(--pink-dim);color:var(--pink)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot-g{background:var(--green);animation:blink 1.4s infinite}.dot-y{background:var(--yellow)}.dot-r{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mb{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px;animation:moslide .2s ease}
.mb-lg{max-width:760px}.mb-xl{max-width:960px}
@keyframes moslide{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mo-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:3px;transition:color .2s}
.mo-x:hover{color:var(--text)}
.mo-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--muted2);margin-bottom:20px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:var(--muted)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;min-width:260px;max-width:360px;display:flex;align-items:center;gap:9px;font-size:13px;animation:tslide .25s ease;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.toast-ok{border-left:3px solid var(--green)}.toast-err{border-left:3px solid var(--red)}.toast-info{border-left:3px solid var(--blue)}.toast-warn{border-left:3px solid var(--yellow)}
@keyframes tslide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.chart-box{position:relative;height:210px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px}
.chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 104px);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)}
.chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.chat-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(128,128,128,.05);transition:background .15s;display:flex;align-items:center;gap:10px;position:relative}
.chat-item:hover{background:rgba(128,128,128,.06)}
.chat-item.active{background:var(--accent-dim);border-left:2px solid var(--accent)}
.chat-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-main{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:68%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-out{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:4px}
.msg-in{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;margin-top:4px;opacity:.6;text-align:right}
.msg-in .msg-meta{text-align:left}
.chat-input-area{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface);align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.4}
.chat-input:focus{border-color:var(--accent)}
/* SLOTS */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s,background .2s}
.slot-card:hover{border-color:var(--border2)}
.slot-card.booked-me{border-color:var(--accent);background:var(--accent-dim)}
.slot-card.full-card{border-color:rgba(255,68,68,.3)}
.slot-time{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent)}
.slot-trainer{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.slot-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:6px}
.slot-tag-f{background:var(--purple-dim);color:var(--purple)}
.slot-enrolled-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto}
.slot-enrolled-list::-webkit-scrollbar{width:3px}
.slot-enrolled-list::-webkit-scrollbar-thumb{background:var(--border2)}
.slot-client-row{display:flex;align-items:center;gap:7px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.slot-client-av{width:22px;height:22px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.slot-client-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-rm-btn{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);border-radius:5px;padding:2px 7px;color:var(--red);font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s}
.slot-rm-btn:hover{background:var(--red);color:#fff}
.pb-wrap{margin-bottom:10px}
.pb-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}

<script>
'use strict';
const PLANS=['Silver','Gold','Platinum','Platinum Plus','Couple','Corporate Fitness'];
const SESSION_TYPES=['Batch Session','One on One','Corporate Fitness','Couple Training','Strength Training','Cardio','HIIT','Yoga','CrossFit','Pilates','Zumba','Rehabilitation','General Fitness'];
const COUNTRIES=['Afghanistan','Albania','Algeria','Argentina','Australia','Austria','Bahrain','Bangladesh','Belgium','Brazil','Canada','Chile','China','Colombia','Croatia','Czech Republic','Denmark','Egypt','Ethiopia','Finland','France','Germany','Ghana','Greece','Hungary','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Japan','Jordan','Kenya','Kuwait','Lebanon','Malaysia','Mexico','Morocco','Netherlands','New Zealand','Nigeria','Norway','Oman','Pakistan','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Saudi Arabia','Singapore','South Africa','South Korea','Spain','Sri Lanka','Sweden','Switzerland','Thailand','Turkey','UAE','Uganda','Ukraine','United Kingdom','United States','Vietnam','Zimbabwe'];
const RATING_CRITERIA=[
  {id:'punctuality',label:'Punctuality',icon:'⏰',desc:'On time for sessions'},
  {id:'technique',label:'Technique',icon:'💪',desc:'Correct form & guidance'},
  {id:'communication',label:'Communication',icon:'🗣',desc:'Clear & motivating'},
  {id:'clientProgress',label:'Client Progress',icon:'📈',desc:'Results & improvement'},
  {id:'professionalism',label:'Professionalism',icon:'🎯',desc:'Conduct & attitude'},
];
const LEAVE_REASONS=['Personal Emergency','Medical Leave','Family Emergency','Planned Vacation','Other'];
let CU=null,CR=null,CH={};
let _chatUnsub=null,_notifUnsub=null,_notifCheckTimer=null,_midnightTimer=null;
let _notifications=[];
const TC_RESET_KEY='gyh_tc_last_reset';
const REMINDED_KEY='gyh_reminded_sessions';
function getTodayStr(){return new Date().toISOString().split('T')[0];}
async function doTcDailyReset(){
  const today=getTodayStr(),last=localStorage.getItem(TC_RESET_KEY);
  if(last===today)return;
  try{
    const entries=await fsGetAll('timechart');
    const toReset=entries.filter(e=>e.todayStatus&&e.todayStatus!=='not-started'&&e.lastStatusUpdate!==today);
    await Promise.all(toReset.map(e=>fsUpdate('timechart',e.id,{todayStatus:'not-started',lastStatusUpdate:today})));
    localStorage.setItem(TC_RESET_KEY,today);
    if(toReset.length>0)toast(`📋 Time Chart reset for ${today}`,'info');
  }catch(e){console.warn('[TC Reset]',e);}
}
function scheduleMidnightReset(){
  if(_midnightTimer){clearTimeout(_midnightTimer);_midnightTimer=null;}
  const now=new Date(),next=new Date(now);
  next.setHours(24,0,0,500);
  _midnightTimer=setTimeout(async()=>{await doTcDailyReset();scheduleMidnightReset();},next-now);
}
function getReminderSet(){try{return new Set(JSON.parse(localStorage.getItem(REMINDED_KEY)||'[]'));}catch{return new Set();}}
function addToReminderSet(key){
  const s=getReminderSet();s.add(key);
  const today=getTodayStr();const fresh=[...s].filter(k=>k.includes(today));
  localStorage.setItem(REMINDED_KEY,JSON.stringify(fresh));
}
function showReminderToast(title,body,onJoin){
  document.querySelectorAll('.reminder-toast').forEach(r=>r.remove());
  const div=document.createElement('div');div.className='reminder-toast';
  div.innerHTML=`<button class="reminder-toast-close" onclick="this.parentElement.remove()">✕</button>
    <div class="reminder-toast-title">⏰ ${title}</div>
    <div class="reminder-toast-body">${body}</div>
    ${onJoin?`<button class="btn btn-p btn-sm" style="margin-top:10px" onclick="${onJoin}">Join Session 🔗</button>`:''}`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),30000);
}
async function checkUpcomingSessions(){
  if(!CU||!CR)return;
  try{

          toast(`⏰ Reminder: ${s.clientName} at ${to12h(s.time)}`,'info');
        }

async function sendReset(){
  const emailInput = document.getElementById('re-email');
  const errEl      = document.getElementById('re-err');
  const okEl       = document.getElementById('re-ok');
  const btn        = document.getElementById('re-btn');
  if(!emailInput || !errEl || !okEl || !btn) return;

  const e = emailInput.value.trim();
  errEl.classList.remove('show');
  okEl.classList.remove('show');

  if(!e){ errEl.textContent='Please enter your email address.'; errEl.classList.add('show'); return; }

  // basic email format check
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){
    errEl.textContent='Please enter a valid email address.'; errEl.classList.add('show'); return;
  }

  btn.innerHTML='<span class="spin"></span> Sending…';
  btn.disabled=true;

  try{
    // Always use the PRIMARY auth instance (window.FB.auth), NOT auth2
    await fn().sendPasswordResetEmail(window.FB.auth, e);

    okEl.textContent='✅ Reset email sent! Check your inbox (and spam folder).';
    okEl.classList.add('show');
    btn.textContent='Sent ✓';
    // close modal after 3 seconds
    setTimeout(()=>closeM1(), 3000);

  }catch(err){
    btn.textContent='Send Reset Link';
    btn.disabled=false;

    const code = err.code || '';
    let msg;
    if(code==='auth/user-not-found')
      msg='No account found with this email address.';
    else if(code==='auth/invalid-email')

function renderLeaveTable(data, userRoleBadge){
  if(!data.length) return emptyState('🏖','No leave requests','','','');
  // userRoleBadge helper inline for global use
  function badge(role){
    return role==='trainer'?'<span class="badge b-g">🧑‍🏫 Trainer</span>':
           role==='coordinator'?'<span class="badge b-b">🧑‍💼 Coordinator</span>':
           role==='coordinatorhead'?'<span class="badge b-o">👑 Coord. Head</span>':
           '<span class="badge b-gray">—</span>';
  }
  return`<table><thead><tr>
    <th>Staff</th><th>Role</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Status</th><th>Reviewed By</th><th>Actions</th>
  </tr></thead><tbody>
  ${data.map(l=>`<tr>
    <td><strong>${l.requestedByName||'—'}</strong></td>
    <td>${badge(l.requestedByRole)}</td>
    <td style="font-size:12px">${l.fromDate||'—'}</td>
    <td style="font-size:12px">${l.toDate||'—'}</td>
    <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${l.days||'—'}</td>
    <td><span class="badge b-b">${l.reason||'—'}</span></td>
    <td>${statusBadge(l.status||'pending')}</td>
    <td style="font-size:12px">${l.reviewedByName||'—'}${l.reviewNote?`<div style="color:var(--muted);font-size:11px">"${l.reviewNote}"</div>`:''}</td>
    <td><div class="td-actions">
      ${l.status==='pending'?`
        <button class="btn btn-gr btn-sm" onclick="openReviewLeave('${l.id}','approved','${(l.requestedByName||'').replace(/'/g,"\\'")}','${l.requestedByRole}','${l.fromDate}','${l.toDate}')">✅</button>
        <button class="btn btn-d btn-sm" onclick="openReviewLeave('${l.id}','rejected','${(l.requestedByName||'').replace(/'/g,"\\'")}','${l.requestedByRole}','${l.fromDate}','${l.toDate}')">❌</button>`:''}
      <button class="btn btn-d btn-sm" onclick="delLeave('${l.id}')">Del</button>
    </div></td>
  </tr>`).join('')}
  </tbody></table>`;
}

function filterLeaveByDate(){
  const from=$('lv-filter-from')?.value;
  const to=$('lv-filter-to')?.value;
  const status=$('lv-filter-status')?.value||'';
  const search=($('lv-filter-search')?.value||'').toLowerCase().trim();
  let data=window._leaveData||[];
  if(from)data=data.filter(l=>(l.fromDate||'')>=from);
  if(to)data=data.filter(l=>(l.fromDate||'')<=to);
  if(status)data=data.filter(l=>l.status===status);
  if(search)data=data.filter(l=>(l.requestedByName||'').toLowerCase().includes(search));
  const tbl=$('lv-table');
  if(tbl)tbl.innerHTML=renderLeaveTable(data);
}

function openReviewLeave(leaveId,decision,staffName,staffRole,fromDate,toDate){
  const isApprove=decision==='approved';
  openM1(`${isApprove?'APPROVE':'REJECT'} LEAVE`,`
    <div style="background:${isApprove?'var(--green-dim)':'var(--red-dim)'};border:1px solid ${isApprove?'rgba(0,230,118,.3)':'rgba(255,68,68,.3)'};border-radius:10px;padding:14px;margin-bottom:14px">

        ${isApprove?'✅ Confirm Approve':'❌ Confirm Reject'}

async function submitLeaveReview(leaveId,decision,staffName,staffRole){
  const note=document.getElementById('lv-rnote')?.value.trim()||'';
  try{
    await fsUpdate('leaves',leaveId,{status:decision,reviewedBy:auth().currentUser.uid,reviewedByName:CU.name||'',reviewNote:note,reviewedAt:fn().serverTimestamp()});
    const leave=await fsGet('leaves',leaveId);
    if(leave?.requestedById){
      await createNotifForUsers({
        key:`leave_review_${leaveId}`,
        title:`🏖 Leave ${decision==='approved'?'Approved ✅':'Rejected ❌'}`,
        body:`Your leave request (${leave.fromDate} – ${leave.toDate}) has been ${decision} by ${CU.name||'Manager'}.${note?` Note: "${note}"`:'' }`,
        type:'leave_review'
      },[leave.requestedById]);
    }
    closeM1();toast(`Leave ${decision}!`,'success');leavemgmt();
  }catch(e){toast('Error: '+e.message,'error');}
}

async function delLeave(id){
  if(!confirm('Delete this leave record?'))return;
  try{await fsDel('leaves',id);toast('Deleted','success');leavemgmt();}
  catch(e){toast('Error','error');}
}

function qrSetOverall(n){window._qrState.overall=n;const labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🌟 Excellent!'];const colors=['','#ff4444','#ff7700','var(--yellow)','#88cc00','var(--accent)'];const starsEl=$('qr-overall-stars'),labelEl=$('qr-overall-label'),descEl=$('qr-overall-desc');if(!starsEl)return;starsEl.querySelectorAll('.star-btn').forEach((btn,i)=>{btn.classList.toggle('active',i<n);btn.style.color=i<n?colors[n]:'';});if(labelEl){labelEl.textContent=labels[n]||'';labelEl.style.color=colors[n];}const descs=['','Needs improvement','Below average','Meets expectations','Above average','Outstanding!'];if(descEl)descEl.textContent=descs[n]||'';const sb=$('qr-submit-btn');if(sb)sb.disabled=n===0;}

async function markSessionStatus(id,status,skipRatePrompt=false){
  if(id&&id.startsWith('tc_')){const tcId=id.replace('tc_','');await tcMarkStatus(tcId,status);return;}
  try{
    await fsUpdate('sessions',id,{status});toast(`Session marked: ${status}`,'success');
    if(status==='completed'&&!skipRatePrompt&&(CR==='coordinator'||CR==='coordinatorhead')){const sess=await fsGet('sessions',id);if(sess&&sess.trainerId&&sess.trainerName){showQuickRateOverlay(id,sess.trainerId,sess.trainerName,sess.type||'Session',sess.date||new Date().toISOString().split('T')[0]);}}
    if(status==='missed'){
      const sess=await fsGet('sessions',id);if(!sess)return;
      const myUid=auth().currentUser.uid;let assignedCoordIds=[];
      if(sess.clientId){const client=await fsGet('clients',sess.clientId);if(client&&client.coordinatorId){assignedCoordIds=[client.coordinatorId];}}
      const[heads,admins]=await Promise.all([fsGetAll('users',fn().where('role','==','coordinatorhead')),fsGetAll('users',fn().where('role','==','admin'))]);
      const allTargetIds=[...new Set([...assignedCoordIds,...heads.map(h=>h.id),...admins.map(a=>a.id)])];
      const reqRef=await fsAdd('missedreasonrequests',{sessionId:id,clientName:sess.clientName||'',trainerName:sess.trainerName||'',date:sess.date||'',time:sess.time||'',markedBy:myUid,markedByName:CU.name||'',assignedCoordIds:allTargetIds,resolved:false});
      const msgText=`⚠️ MISSED SESSION ALERT\nClient: ${sess.clientName||'—'}\nTrainer: ${sess.trainerName||'—'}\nTime: ${to12h(sess.time)} on ${sess.date}\nMarked by: ${CU.name||'System'}\n\nPlease follow up and log the reason.`;
      const chatPromises=allTargetIds.filter(uid=>uid!==myUid).map(async uid=>{const chatId=getChatId(myUid,uid);try{await fn().addDoc(fn().collection(db(),`chats/${chatId}/messages`),{senderId:myUid,senderName:CU.name||CU.email||'',message:msgText,timestamp:fn().serverTimestamp(),read:false,type:'missed_session_alert'});await fn().setDoc(fn().doc(db(),'chats',chatId),{participants:[myUid,uid],lastMessage:`⚠️ Missed: ${sess.clientName}`,lastMessageTime:fn().serverTimestamp(),lastSenderId:myUid},{merge:true});}catch(e){}});
      await Promise.all(chatPromises);
      await createNotifForUsers({key:`missed-${id}-${Date.now()}`,title:'⚠️ Session Missed',body:`${sess.clientName||'Client'} missed session with ${sess.trainerName||'Trainer'} at ${to12h(sess.time)} on ${sess.date}. Please enter the reason.`,type:'missed_session',sessionId:id,clientName:sess.clientName||'',requiresReason:true},allTargetIds);
      toast('📨 Coordinators notified via chat','info');
      if(CR==='coordinator'||CR==='coordinatorhead'){setTimeout(()=>{showMissedReasonPopup(id,sess.clientName||'',sess.trainerName||'',sess.date||'',sess.time||'',reqRef?reqRef.id:'');},500);}
    }
    const activePanel=document.querySelector('.ni.active')?.id?.replace('ni-','');
    if(activePanel==='dash')dash();else if(activePanel==='sessions')sessions();
  }catch(e){toast('Error: '+e.message,'error');}
}

function closeDotsAndScroll(headerId){document.querySelectorAll('.dots-dropdown').forEach(d=>d.classList.remove('open'));const el=document.getElementById(headerId);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});const sectionId=headerId.replace('col-hd-','');const body=document.getElementById('col-body-'+sectionId);if(body&&!body.classList.contains('open')){toggleCollapsible(sectionId);}}}
function renderDashTodaySessions(todayS,tcVisible,canStart){
  const realClientIds=new Set(todayS.map(s=>s.clientId).filter(Boolean));
  const tcFiltered=tcVisible.filter(tc=>!realClientIds.has(tc.clientId));
  const combined=[...todayS,...tcFiltered];combined.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if(!combined.length)return emptyState('📅','No sessions today','','','');
  const rows=combined.map(s=>{
    const isTc=!!s._isTc;const tcBadge=isTc?`<span class="tc-dash-badge" title="From Time Chart">📋 Fixed</span>`:'';
    const actBtns=canStart?`${s.status==='not-started'?`<button class="btn btn-gr btn-sm" onclick="markSessionStatus('${s.id}','onair')">▶ Start</button>`:''}${s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed')">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗ Miss</button>`:''}`:''
    return`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)"><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);min-width:80px">${to12h(s.time)}</div><div style="flex:1"><div style="font-weight:600;font-size:13px">${s.clientName||'—'} ${tcBadge}</div><div style="font-size:12px;color:var(--muted)">${s.trainerName||'—'} • ${s.type||'Session'}</div></div>${statusBadge(s.status)}<div style="display:flex;gap:5px">${actBtns}</div></div>`;
  }).join('');
  return`<div style="padding:0 2px">${rows}</div>`;
}
function buildLeaderboard(trainers,allRatings,allClients){return trainers.map(t=>{const tRatings=allRatings.filter(r=>r.trainerId===t.id);const avg=tRatings.length?avgRating(tRatings):0;const tClients=allClients.filter(c=>c.trainerId===t.id).length;const criteriaAvg={};RATING_CRITERIA.forEach(c=>{const vals=tRatings.filter(r=>r.criteria&&r.criteria[c.id]).map(r=>r.criteria[c.id]);criteriaAvg[c.id]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;});return{...t,avg,totalRatings:tRatings.length,clientCount:tClients,criteriaAvg};}).sort((a,b)=>b.avg-a.avg||b.totalRatings-a.totalRatings);}
function renderLeaderboard(ranked){if(!ranked.length)return emptyState('🏆','No trainer ratings yet','Rate trainers after sessions.','','');const medals=['🥇','🥈','🥉'];const rankClasses=['gold','silver','bronze','other'];const starColors={5:'var(--accent)',4:'#88cc00',3:'var(--yellow)',2:'#ff7700',1:'#ff4444',0:'var(--muted)'};return`<div>${ranked.map((t,i)=>{const ini=(t.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);const col=starColors[Math.round(t.avg)]||'var(--muted)';const bestCrit=RATING_CRITERIA.filter(c=>t.criteriaAvg[c.id]>0).sort((a,b)=>t.criteriaAvg[b.id]-t.criteriaAvg[a.id])[0];return`<div class="lb-row"><div class="lb-rank ${rankClasses[i]||'other'}">${i+1}</div><div class="lb-medal">${medals[i]||''}</div><div class="lb-avatar" style="background:var(--green-dim);color:var(--green)">${ini}</div><div class="lb-info"><div class="lb-name">${t.name||'—'}</div><div class="lb-meta">${t.clientCount} client${t.clientCount!==1?'s':''} · ${t.totalRatings} rating${t.totalRatings!==1?'s':''}${bestCrit?` · Best: ${bestCrit.icon}${bestCrit.label}`:''}</div><div class="lb-bar-wrap"><div class="lb-bar-fill" style="width:${t.avg/5*100}%"></div></div></div><div class="lb-score"><div class="lb-stars">${'★'.repeat(Math.round(t.avg))}${'☆'.repeat(5-Math.round(t.avg))}</div><div class="lb-num" style="color:${col}">${t.avg.toFixed(1)}</div><div class="lb-cnt">/ 5.0</div></div></div>`;}).join('')}</div>`;}

    return emptyState('📅',msgs[tab]||'No sessions',CR!=='client'?'Use the Schedule button to add sessions.':'Your coordinator will schedule sessions.',CR!=='client'&&tab!=='past'?'+ Schedule':'',CR!=='client'&&tab!=='past'?'openAddSession()':'');
  }
  return`<table><thead><tr>
    <th>Date</th><th>Time</th><th>Client</th><th>Trainer</th><th>Type</th><th>Status</th><th>Meet Link</th><th>Actions</th>
  </tr></thead><tbody>
  ${data.map(s=>`<tr>
    <td style="font-size:12px">${s.date||'—'}</td>
    <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)">${to12h(s.time)}</td>
    <td><strong>${s.clientName||'—'}</strong></td>
    <td style="font-size:12px">${s.trainerName||'—'}</td>
    <td style="font-size:12px">${s.type||'—'}</td>
    <td>${statusBadge(s.status)}</td>
    <td>${s.meetLink?`<a href="${s.meetLink}" target="_blank" style="color:var(--accent);font-size:12px">Join 🔗</a>`:'—'}</td>
    <td><div class="td-actions">
      <button class="btn btn-bl btn-sm" onclick="openSessionDetail('${s.id}')">📋 Detail</button>
      ${CR!=='client'&&s.status==='not-started'?`<button class="btn btn-gr btn-sm" onclick="markSessionStatus('${s.id}','onair',true)">▶ Start</button>`:''}
      ${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed')">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗ Miss</button>`:''}
      ${CR==='admin'&&s.status==='onair'?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed')">✗ Miss</button>`:''}
      ${CR==='trainer'&&(s.status==='onair'||s.status==='not-started')?`<button class="btn btn-p btn-sm" onclick="markSessionStatus('${s.id}','completed',true)">✓ Done</button><button class="btn btn-d btn-sm" onclick="markSessionStatus('${s.id}','missed',true)">✗ Miss</button>`:''}
      ${CR==='admin'||CR==='coordinator'||CR==='coordinatorhead'?`<button class="btn btn-g btn-sm" onclick="openEditSession('${s.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delSession('${s.id}')">Del</button>`:''}
      ${(CR==='coordinator'||CR==='coordinatorhead')&&s.status==='completed'?`<button class="btn btn-yw btn-sm" onclick="openRateTrainer('${s.trainerId||''}','${(s.trainerName||'').replace(/'/g,"\\'")}')">⭐ Rate</button>`:''}
    </div></td>
  </tr>`).join('')}
  </tbody></table>`;
}

// ── SESSION DETAIL MODAL ───────────────────────────────────────

    fsGet('sessions',sessionId),
    fsGet('sessionworkouts',sessionId),

          </div>
          <div id="qr-render" style="display:inline-block;background:#fff;padding:16px;border-radius:12px;margin-bottom:16px"></div>

            <div id="qr-checkins" style="font-size:12px;color:var(--muted)">Loading…</div>

      </div>

    </div><!-- end sd-body -->
  </div><!-- end sd-box -->`;

  // Generate QR after render
  setTimeout(()=>renderQR(sessionId),150);

  // Load QR check-ins if admin
  if(canEdit)loadQRCheckins(sessionId);
}

function sdTab(tabEl,panelId){
  const box=tabEl.closest('.sd-box');
  box.querySelectorAll('.sd-tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  box.querySelectorAll('.sd-panel').forEach(p=>p.classList.remove('active'));
  const panel=document.getElementById(panelId);if(panel)panel.classList.add('active');
}

// ── WORKOUT BUILDER ────────────────────────────────────────────
let _exRowIdx=0;
function buildExRow(e={},idx,canEdit=true){
  _exRowIdx=Math.max(_exRowIdx,idx+1);
  const dis=canEdit?'':'disabled';
  return`<div class="ex-row" id="exrow-${idx}">
    <input class="ex-inp name-inp" placeholder="Exercise name…" value="${e.name||''}" data-f="name" ${dis}>
    <input class="ex-inp" placeholder="3" type="number" value="${e.sets||''}" data-f="sets" ${dis}>
    <input class="ex-inp" placeholder="12 / 8-10" value="${e.reps||''}" data-f="reps" ${dis}>
    <input class="ex-inp" placeholder="20kg / BW" value="${e.weight||''}" data-f="weight" ${dis}>
    <input class="ex-inp" placeholder="60" type="number" value="${e.rest||''}" data-f="rest" ${dis}>
    ${canEdit?`<button class="ex-del-btn" onclick="document.getElementById('exrow-${idx}').remove()">✕</button>`:'<div></div>'}
  </div>`;
}

function addExRow(){
  const container=document.getElementById('ex-rows');if(!container)return;
  container.insertAdjacentHTML('beforeend',buildExRow({},_exRowIdx++,true));
}

async function saveWorkout(sessionId){
  const rows=[...document.querySelectorAll('#ex-rows .ex-row')];
  const exercises=rows.map(row=>({
    name:row.querySelector('[data-f=name]')?.value.trim()||'',
    sets:row.querySelector('[data-f=sets]')?.value||'',
    reps:row.querySelector('[data-f=reps]')?.value||'',
    weight:row.querySelector('[data-f=weight]')?.value||'',
    rest:row.querySelector('[data-f=rest]')?.value||''
  })).filter(e=>e.name);
  const mediaLink=document.getElementById('wb-media')?.value.trim()||'';
  try{
    await fn().setDoc(fn().doc(db(),'sessionworkouts',sessionId),{
      sessionId,exercises,
      warmup:document.getElementById('wb-warmup')?.value||'',
      cooldown:document.getElementById('wb-cooldown')?.value||'',
      notes:document.getElementById('wb-notes')?.value||'',
      savedBy:CU.name||'',updatedAt:fn().serverTimestamp()
    });
    if(mediaLink)await fsUpdate('sessions',sessionId,{mediaLink});
    toast('💪 Workout plan saved!','success');
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── SESSION NOTES ──────────────────────────────────────────────
async function saveNotes(sessionId){
  try{
    await fsUpdate('sessions',sessionId,{
      trainerNotes:document.getElementById('sn-trainer')?.value||'',
      notes:document.getElementById('sn-general')?.value||'',
      mediaLink:document.getElementById('sn-media')?.value.trim()||''
    });
    toast('📝 Notes saved!','success');
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── BODY STATS ─────────────────────────────────────────────────
function openAddStats(sessionId,clientName,clientId){
  openM1(`📊 LOG STATS — ${clientName.toUpperCase()}`,`
    <div class="fr">
      <div class="fg"><label class="fl">Date</label><input class="fi" id="st-date" type="date" value="${getTodayStr()}"></div>
      <div class="fg"><label class="fl">Body Weight (kg)</label><input class="fi" id="st-weight" type="number" step="0.1" placeholder="72.5"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Total Sets Done</label><input class="fi" id="st-sets" type="number"></div>
      <div class="fg"><label class="fl">Total Reps Done</label><input class="fi" id="st-reps" type="number"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Max Weight Lifted (kg)</label><input class="fi" id="st-maxw" type="number" step="0.5"></div>
      <div class="fg"><label class="fl">Calories Burned</label><input class="fi" id="st-cal" type="number"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Duration (min)</label><input class="fi" id="st-dur" type="number"></div>
      <div class="fg"><label class="fl">Avg Heart Rate (bpm)</label><input class="fi" id="st-hr" type="number"></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="st-notes" style="min-height:55px"></textarea></div>
    <div class="mo-foot">
      <button class="btn btn-g" onclick="closeM1()">Cancel</button>
      <button class="btn btn-p" onclick="saveStat('${sessionId}','${clientName.replace(/'/g,"\\'")}','${clientId}')">Save Stats</button>
    </div>`);
}

async function saveStat(sessionId,clientName,clientId){
  try{
    await fsAdd('sessionstats',{
      sessionId,clientId,clientName,
      date:document.getElementById('st-date')?.value||getTodayStr(),
      weight:document.getElementById('st-weight')?.value||'',
      totalSets:document.getElementById('st-sets')?.value||'',
      totalReps:document.getElementById('st-reps')?.value||'',
      maxWeight:document.getElementById('st-maxw')?.value||'',
      calories:document.getElementById('st-cal')?.value||'',
      duration:document.getElementById('st-dur')?.value||'',
      heartRate:document.getElementById('st-hr')?.value||'',
      notes:document.getElementById('st-notes')?.value||'',
      loggedBy:CU.name||''
    });
    closeM1();toast('📊 Stats logged!','success');
    // refresh stats panel
    const panel=document.getElementById('sdp-stats');
    if(panel){const stats=await fsGetAll('sessionstats',fn().where('sessionId','==',sessionId));
      // simple reload
      document.getElementById('sd-overlay')?.remove();
      openSessionDetail(sessionId);
    }
  }catch(e){toast('Error: '+e.message,'error');}
}

async function delStat(id,sessionId){
  if(!confirm('Delete this stat entry?'))return;
  try{await fsDel('sessionstats',id);toast('Deleted','success');document.getElementById('sd-overlay')?.remove();openSessionDetail(sessionId);}
  catch(e){toast('Error','error');}
}

// ── PRE-SESSION CHECKLIST ──────────────────────────────────────
async function saveChecklist(sessionId){
  const ids=['equip','space','water','plan','health','warmup','timer','music'];
  const data={sessionId};
  ids.forEach(id=>{data[id]=document.getElementById('chk-'+id)?.checked||false;});
  try{
    await fn().setDoc(fn().doc(db(),'sessionchecklist',sessionId),{...data,savedBy:CU.name||'',updatedAt:fn().serverTimestamp()});
    toast('✅ Checklist saved!','success');
    // update badges

function toggleRecCustom(){
  const v=document.getElementById('rec-freq')?.value;
  const wrap=document.getElementById('rec-custom-wrap');
  if(wrap)wrap.style.display=v==='custom'?'flex':'none';
}

async function createRecurring(sessionId,clientId,clientName,trainerId,trainerName,time,type){
  const freq=document.getElementById('rec-freq')?.value||'weekly';
  const count=Math.min(Number(document.getElementById('rec-count')?.value||12),60);
  const startDate=document.getElementById('rec-start')?.value;
  if(!startDate){toast('Set a start date','error');return;}

  const dayMap={Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:0};
  const selectedDays=freq==='custom'
    ?[...document.querySelectorAll('.rec-day-btn.sel')].map(b=>dayMap[b.dataset.day])
    :[];
  if(freq==='custom'&&!selectedDays.length){toast('Select at least one day','error');return;}

  const dates=[];let cur=new Date(startDate);let attempts=0;
  while(dates.length<count&&attempts<600){
    attempts++;
    const d=cur.toISOString().split('T')[0];
    const dow=cur.getDay();
    let inc=false;
    if(freq==='daily')inc=true;
    else if(freq==='alternate'){inc=dates.length===0||(new Date(d)-new Date(dates[dates.length-1]))/(86400000)>=2;}
    else if(freq==='weekly'){inc=(new Date(d)-new Date(startDate))%(7*86400000)===0;}
    else if(freq==='custom')inc=selectedDays.includes(dow);
    if(inc)dates.push(d);
    cur=new Date(cur.getTime()+86400000);
  }
  if(!dates.length){toast('Could not generate dates — check frequency settings','error');return;}

  const btn=document.querySelector('#sdp-recurring .btn-p');
  if(btn){btn.textContent=`Creating ${dates.length} sessions…`;btn.disabled=true;}
  try{
    await Promise.all(dates.map(date=>fsAdd('sessions',{
      clientId,clientName,trainerId,trainerName,date,time,type,
      status:'not-started',meetLink:'',notes:'[Recurring]',recurringFrom:sessionId
    })));
    document.getElementById('sd-overlay')?.remove();
    toast(`✅ ${dates.length} recurring sessions created!`,'success');
    sessions();
  }catch(e){
    toast('Error: '+e.message,'error');
    if(btn){btn.textContent='🔄 Create Sessions';btn.disabled=false;}
  }
}

// ── QR CODE ATTENDANCE ─────────────────────────────────────────
function renderQR(sessionId){
  const container=document.getElementById('qr-render');if(!container)return;
  // Build check-in URL — points to the app with a special parameter
  const baseUrl=window.location.href.split('?')[0];
  const qrUrl=`${baseUrl}?qr_checkin=${sessionId}`;
  // Use QR Server API (free, no library needed)
  const img=document.createElement('img');
  img.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}&bgcolor=ffffff&color=000000&margin=10&format=png`;
  img.alt='QR Code';img.style.cssText='width:200px;height:200px;display:block;border-radius:8px';
  img.onerror=()=>{container.innerHTML=`<div style="width:200px;height:200px;background:var(--surface);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:20px">QR requires internet connection</div>`;};
  container.innerHTML='';container.appendChild(img);
  // Store URL for download
  window._lastQRUrl=qrUrl;window._lastQRImg=img.src;
}

function downloadQR(sessionId){
  const imgUrl=window._lastQRImg;
  if(!imgUrl){toast('QR not ready yet','error');return;}
  const a=document.createElement('a');a.href=imgUrl;a.download=`session_qr_${sessionId}.png`;a.click();
  toast('QR downloaded!','success');
}

function copyQRLink(sessionId){
  const url=window._lastQRUrl||`${window.location.href.split('?')[0]}?qr_checkin=${sessionId}`;
  navigator.clipboard?.writeText(url).then(()=>toast('Link copied!','success')).catch(()=>{
    prompt('Copy this link:',url);
  });
}

function shareQRWA(sessionId,clientName,date,time){
  const url=window._lastQRUrl||`${window.location.href.split('?')[0]}?qr_checkin=${sessionId}`;

// Handle QR check-in on page load (client scans QR)
(function handleQRCheckin(){
  const params=new URLSearchParams(window.location.search);
  const sessionId=params.get('qr_checkin');
  if(!sessionId)return;
  // Remove param from URL
  window.history.replaceState({},'',window.location.pathname);
  // Wait for auth
  document.addEventListener('fbReady',()=>{
    fn().onAuthStateChanged(window.FB.auth,async user=>{
      if(!user)return;
      const uDoc=await fsGet('users',user.uid)||await fsGet('clients',user.uid);
      if(!uDoc)return;
      // Check session exists
      const sess=await fsGet('sessions',sessionId);
      if(!sess){toast('Session not found','error');return;}
      // Already checked in?
      const existing=await fsGetAll('qrcheckins',fn().where('sessionId','==',sessionId),fn().where('clientId','==',user.uid));
      if(existing.length){toast('✅ Already checked in for this session!','info');return;}
      // Save check-in
      await fsAdd('qrcheckins',{
        sessionId,clientId:user.uid,
        clientName:uDoc.name||uDoc.email||'',
        checkedInAt:fn().serverTimestamp(),
        sessionDate:sess.date||'',sessionTime:sess.time||''
      });
      // Mark attendance
      await fsAdd('attendance',{
        clientId:user.uid,clientName:uDoc.name||uDoc.email||'',
        trainerId:sess.trainerId||'',trainerName:sess.trainerName||'',
        date:sess.date||getTodayStr(),status:'present',
        sessionType:sess.type||'',reason:'QR Check-in',
        markedBy:user.uid
      });
      toast('✅ Attendance marked via QR!','success');
    });
  });
})();

async function certificates(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  const myUid=auth().currentUser.uid;const certs=await fsGetAll('certificates',fn().where('trainerId','==',myUid));certs.sort((a,b)=>(b.issueYear||0)-(a.issueYear||0));
  $('page').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px"><div></div><button class="btn btn-p" onclick="openAddCert()">+ Add Certificate</button></div><div id="cert-list">${certs.length===0?emptyState('🎓','No certificates yet','Add your fitness certifications.','+Add Certificate','openAddCert()'):certs.map(c=>renderCertCard(c)).join('')}</div>`;
}
function renderCertCard(c){return`<div class="cert-card"><div class="cert-icon">🎓</div><div class="cert-body"><div class="cert-name">${c.name||'—'}</div><div class="cert-meta">🏛 ${c.issuer||'—'} ${c.issueYear?`• ${c.issueYear}`:''}${c.expiryYear?` – ${c.expiryYear}`:''}</div>${c.credentialId?`<div class="cert-meta">🔑 ID: ${c.credentialId}</div>`:''}</div><div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0"><button class="btn btn-g btn-sm" onclick="openEditCert('${c.id}')">Edit</button><button class="btn btn-d btn-sm" onclick="delCert('${c.id}')">Delete</button></div></div>`;}
function openAddCert(){openM1('ADD CERTIFICATE',certForm())}
async function openEditCert(id){const c=await fsGet('certificates',id);if(!c){toast('Not found','error');return}openM1('EDIT CERTIFICATE',certForm(c))}

async function clients(){

  else                    data=await fsGetAll('clients');

function filterClients(){
  const search=($('cl-search')?.value||'').toLowerCase().trim();
  const plan=$('cl-filter-plan')?.value||'';
  const status=$('cl-filter-status')?.value||'';
  const mode=$('cl-view-mode')?.value||'cards';

  let data=(window._clientsData||[]).filter(c=>{
    if(search&&!(c.name||'').toLowerCase().includes(search)&&!(c.phone||'').includes(search)&&!(c.trainerName||'').toLowerCase().includes(search))return false;
    if(plan&&c.plan!==plan)return false;
    if(status==='active'&&c.active===false)return false;
    if(status==='inactive'&&c.active!==false)return false;
    return true;
  });

  const view=$('cl-view');if(!view)return;

  if(!data.length){view.innerHTML=emptyState('🏃','No clients found','Try adjusting your search or filters.',CR!=='trainer'&&CR!=='client'?'+ Add Client':'',CR!=='trainer'&&CR!=='client'?'openAddClient()':'');return;}

  if(mode==='table'){
    view.innerHTML=`<div class="card" style="padding:0"><div class="tbl-wrap">${renderClientsTable(data)}</div></div>`;
    return;
  }

  // Cards view
  view.innerHTML=`<div class="cl-grid">${data.map((c,i)=>buildClientCard(c,i)).join('')}</div>`;

  // Animate progress bars after render
  setTimeout(()=>{
    document.querySelectorAll('.cl-progress-fill[data-pct]').forEach(el=>{
      el.style.width=el.dataset.pct+'%';
    });
  },100);
}

function buildClientCard(c,idx){
  const allSessions=window._allSessions||[];
  const allAttendance=window._allAttendance||[];
  const allRatings=window._allRatings||[];

  const cSessions=allSessions.filter(s=>s.clientId===c.id);
  const cAttend=allAttendance.filter(a=>a.clientId===c.id);
  const present=cAttend.filter(a=>a.status==='present').length;
  const attRate=cAttend.length?Math.round(present/cAttend.length*100):0;
  const completed=cSessions.filter(s=>s.status==='completed').length;
  const trainerRatings=allRatings.filter(r=>r.trainerId===c.trainerId);
  const avgRating=trainerRatings.length?(trainerRatings.reduce((s,r)=>s+(r.rating||0),0)/trainerRatings.length).toFixed(1):null;

  const ini=(c.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const grad=planGrad(c.plan);
  const pColor=planColor(c.plan);
  const isActive=c.active!==false;

  // Days since start
  let daysSince='—';let daysNum=0;
  if(c.startDate){daysNum=Math.floor((new Date()-new Date(c.startDate))/86400000);daysSince=daysNum>0?daysNum+' days':'Today';}

  return`<div class="cl-card" onclick="openClientJourney('${c.id}')">
    <div class="cl-card-glow"></div>

    <!-- Banner -->
    <div class="cl-banner">
      <div class="cl-banner-bg" style="background:${grad}"></div>
      <div class="cl-banner-hexes"></div>
      <div class="cl-banner-pattern"></div>
      <!-- Plan badge -->
      <div style="position:absolute;top:10px;right:12px;z-index:2">
        ${planBadge(c.plan)}
      </div>
      <!-- Active badge -->
      <div style="position:absolute;top:10px;left:12px;z-index:2">
        <span class="badge ${isActive?'b-g':'b-r'}" style="font-size:10px">${isActive?'● Active':'● Inactive'}</span>
      </div>
      <!-- Avatar -->
      <div class="cl-avatar-wrap">
        <div class="cl-avatar" style="background:${pColor}22;color:${pColor}">${ini}</div>
      </div>
      <div class="cl-status-dot ${isActive?'active':'inactive'}"></div>
    </div>

    <!-- Body -->
    <div class="cl-body">
      <div class="cl-name">${c.name||'—'}</div>
      <div class="cl-role">${c.trainerName?'🧑‍🏫 '+c.trainerName:'No trainer'} ${c.coordinatorName?'· 🧑‍💼 '+c.coordinatorName:''}</div>

      <div class="cl-tags">
        ${c.goal?`<span class="badge b-gray" style="font-size:10px">🎯 ${c.goal}</span>`:''}
        ${c.sessionsPerWeek?`<span class="badge b-b" style="font-size:10px">📅 ${c.sessionsPerWeek}x/wk</span>`:''}
        ${c.country?`<span class="badge b-gray" style="font-size:10px">🌍 ${c.country}</span>`:''}
      </div>

      <!-- Mini stats -->
      <div class="cl-mini-stats">
        <div class="cl-mini-stat">
          <div class="cl-mini-stat-val" style="color:var(--accent)">${completed}</div>
          <div class="cl-mini-stat-lbl">Sessions</div>
        </div>
        <div class="cl-mini-stat">
          <div class="cl-mini-stat-val" style="color:${attRate>=80?'var(--green)':attRate>=60?'var(--yellow)':'var(--red)'}">${attRate}%</div>
          <div class="cl-mini-stat-lbl">Attendance</div>
        </div>
        <div class="cl-mini-stat">
          <div class="cl-mini-stat-val" style="color:var(--muted)">${daysSince==='—'?'—':daysNum}</div>
          <div class="cl-mini-stat-lbl">Days In</div>
        </div>
      </div>

      <!-- Attendance bar -->
      <div style="font-size:10px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Attendance Rate</span><span style="color:${attRate>=80?'var(--green)':attRate>=60?'var(--yellow)':'var(--red)'}">${attRate}%</span>
      </div>
      <div class="cl-progress-bar">
        <div class="cl-progress-fill" data-pct="${attRate}" style="width:0%;background:${attRate>=80?'var(--green)':attRate>=60?'var(--yellow)':'var(--red)'}"></div>
      </div>

      ${avgRating?`<div style="font-size:11px;color:var(--muted);margin:8px 0 4px">Trainer Rating</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden">
          <div style="width:${(avgRating/5*100)}%;height:100%;background:linear-gradient(90deg,var(--yellow),var(--accent));border-radius:2px;transition:width 1.2s ease"></div>
        </div>
        <span style="font-size:12px;font-weight:700;color:var(--yellow)">⭐ ${avgRating}</span>
      </div>`:''}

      <!-- Actions -->
      <div class="cl-actions" onclick="event.stopPropagation()">
        <button class="btn btn-p btn-sm" style="flex:1" onclick="openClientJourney('${c.id}')">🗺 Journey</button>
        ${CR!=='trainer'&&CR!=='client'?`<button class="btn btn-g btn-sm" onclick="openEditClient('${c.id}')">Edit</button>`:''}
        ${CR==='admin'?`<button class="btn btn-d btn-sm" onclick="delClient('${c.id}')">Del</button>`:''}
      </div>
    </div>
  </div>`;
}

// ── CLIENT JOURNEY MODAL ───────────────────────────────────────
async function openClientJourney(clientId){
  // Remove existing
  document.getElementById('cj-overlay')?.remove();

  // Loading overlay
  const ov=document.createElement('div');
  ov.className='cj-overlay';ov.id='cj-overlay';
  ov.innerHTML=`<div class="cj-box" style="padding:60px;text-align:center"><div class="spin" style="width:32px;height:32px;margin:0 auto 14px"></div><div style="color:var(--muted)">Loading client journey…</div></div>`;
  document.body.appendChild(ov);

  const[c,sessions,attendance,measurements,ratings,feedback,diet,checkins]=await Promise.all([
    fsGet('clients',clientId),
    fsGetAll('sessions',fn().where('clientId','==',clientId)),
    fsGetAll('attendance',fn().where('clientId','==',clientId)),
    fsGetAll('measurements',fn().where('clientId','==',clientId)),
    c2=>fsGetAll('trainerratings',fn().where('trainerId','==','_')),// placeholder
    fsGetAll('sessionfeedback'),
    fsGet('dietplans',clientId),
    fsGetAll('qrcheckins',fn().where('clientId','==',clientId))
  ].map((fn2,i)=>i===4?fsGetAll('trainerratings',fn().where('trainerId','==','_')):fn2));

  if(!c){ov.remove();toast('Client not found','error');return;}

  // Re-fetch ratings properly
  const trainerRatings=c.trainerId?await fsGetAll('trainerratings',fn().where('trainerId','==',c.trainerId)):[];

  const grad=planGrad(c.plan);
  const pColor=planColor(c.plan);
  const ini=(c.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const isActive=c.active!==false;

  // Computed stats
  const completed=sessions.filter(s=>s.status==='completed').length;
  const missed=sessions.filter(s=>s.status==='missed').length;
  const present=attendance.filter(a=>a.status==='present').length;
  const attRate=attendance.length?Math.round(present/attendance.length*100):0;
  const avgRat=trainerRatings.length?(trainerRatings.reduce((s,r)=>s+(r.rating||0),0)/trainerRatings.length).toFixed(1):null;
  const daysIn=c.startDate?Math.floor((new Date()-new Date(c.startDate))/86400000):null;
  const streak=calcStreak(attendance);
  measurements.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const latestMs=measurements[0]||null;
  const bmi=latestMs?.weight&&latestMs?.height?((latestMs.weight/((latestMs.height/100)**2)).toFixed(1)):null;

  // Build timeline events
  const tlEvents=buildTimeline(c,sessions,attendance,measurements,checkins);

  // Build heatmap (last 12 weeks)
  const heatmapHtml=buildHeatmap(sessions,attendance);

  ov.innerHTML=`
  <div class="cj-box">
    <!-- Hero -->
    <div class="cj-hero">
      <div class="cj-hero-bg" style="background:${grad}"></div>
      <div class="cj-hero-hexes"></div>
      <div class="cj-hero-overlay"></div>
      <div class="cj-hero-particles" id="hero-particles"></div>
      <div class="cj-avatar" style="background:${pColor}22;color:${pColor}">${ini}</div>
      <div class="cj-name">${c.name||'—'} ${isActive?'<span style="font-size:12px;opacity:.7">● Active</span>':'<span style="font-size:12px;opacity:.7;color:#ff8888">● Inactive</span>'}</div>
      <div class="cj-subtitle">${c.plan||'—'} Plan · ${c.goal||'No goal set'} · Started ${c.startDate||'—'}</div>
      <div class="cj-close" onclick="document.getElementById('cj-overlay').remove()">✕</div>
    </div>

    <!-- Tabs -->
    <div class="cj-tabs">
      <div class="cj-tab active" onclick="cjTab(this,'cjp-overview')">📊 Overview</div>
      <div class="cj-tab" onclick="cjTab(this,'cjp-journey')">🗺 Journey</div>
      <div class="cj-tab" onclick="cjTab(this,'cjp-sessions')">📅 Sessions</div>
      <div class="cj-tab" onclick="cjTab(this,'cjp-body')">📏 Body Stats</div>
      <div class="cj-tab" onclick="cjTab(this,'cjp-diet')">🥗 Diet Plan</div>
      <div class="cj-tab" onclick="cjTab(this,'cjp-info')">👤 Profile</div>
    </div>

    <!-- Body -->
    <div class="cj-body">

      <!-- ① OVERVIEW ─────────────────────────────────────── -->
      <div id="cjp-overview" class="cj-panel active">
        <!-- KPIs -->
        <div class="cj-kpi-grid">
          ${[
            {label:'Days In',val:daysIn!==null?daysIn:'—',sub:c.startDate||'No start date',glow:true},
            {label:'Sessions Done',val:completed,sub:`${missed} missed`,glow:false},
            {label:'Attendance',val:attRate+'%',sub:`${present}/${attendance.length} present`,glow:attRate>=80},
            {label:'Streak',val:streak,sub:'days in a row',glow:streak>5},
            {label:'Trainer Rating',val:avgRat?avgRat+'★':'—',sub:`${trainerRatings.length} reviews`,glow:false},
            {label:'Measurements',val:measurements.length,sub:'body records',glow:false},
          ].map(k=>`<div class="cj-kpi">
            ${k.glow?'<div class="cj-kpi-glow"></div>':''}
            <div class="cj-kpi-val">${k.val}</div>
            <div class="cj-kpi-lbl">${k.label}</div>
            <div class="cj-kpi-sub">${k.sub}</div>
          </div>`).join('')}
        </div>

        <!-- Attendance visual -->
        <div style="display:flex;gap:20px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;flex-wrap:wrap">
          <div class="circ-prog">
            <svg viewBox="0 0 90 90">
              <circle class="circ-track" cx="45" cy="45" r="38"/>
              <circle class="circ-fill" cx="45" cy="45" r="38"
                stroke="${attRate>=80?'var(--green)':attRate>=60?'var(--yellow)':'var(--red)'}"
                stroke-dasharray="${2*Math.PI*38}"
                stroke-dashoffset="${2*Math.PI*38*(1-attRate/100)}"
                id="circ-att-${clientId}"/>
            </svg>
            <div class="circ-label">
              <div class="circ-val" style="color:${attRate>=80?'var(--green)':attRate>=60?'var(--yellow)':'var(--red)'}">${attRate}%</div>
              <div class="circ-sub">Attendance<br>Rate</div>
            </div>
          </div>
          <div style="flex:1;min-width:160px">
            <div style="font-size:13px;font-weight:700;margin-bottom:10px">Attendance Breakdown</div>
            ${[['Present',present,'var(--green)'],['Absent',attendance.filter(a=>a.status==='absent').length,'var(--red)'],['Late',attendance.filter(a=>a.status==='late').length,'var(--yellow)']].map(([lbl,cnt,col])=>`
              <div class="rating-bar-row">
                <div style="font-size:12px;min-width:60px;color:var(--muted)">${lbl}</div>
                <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${attendance.length?cnt/attendance.length*100:0}%;background:${col}"></div></div>
                <div style="font-size:12px;font-weight:700;min-width:28px;text-align:right;color:${col}">${cnt}</div>
              </div>`).join('')}
          </div>
          <div style="flex:1;min-width:160px">
            <div style="font-size:13px;font-weight:700;margin-bottom:10px">Session Breakdown</div>
            ${[['Completed',completed,'var(--accent)'],['Missed',missed,'var(--red)'],['On Air',sessions.filter(s=>s.status==='onair').length,'var(--green)'],['Pending',sessions.filter(s=>s.status==='not-started').length,'var(--muted)']].map(([lbl,cnt,col])=>`
              <div class="rating-bar-row">
                <div style="font-size:12px;min-width:70px;color:var(--muted)">${lbl}</div>
                <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${sessions.length?cnt/sessions.length*100:0}%;background:${col}"></div></div>
                <div style="font-size:12px;font-weight:700;min-width:28px;text-align:right;color:${col}">${cnt}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Activity heatmap -->
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">📆 Activity Heatmap (Last 12 Weeks)</div>
          ${heatmapHtml}
          <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--muted)">
            Less <div class="hm-cell hm-0" style="width:12px;height:12px;display:inline-block"></div>
            <div class="hm-cell hm-1" style="width:12px;height:12px;display:inline-block"></div>
            <div class="hm-cell hm-2" style="width:12px;height:12px;display:inline-block"></div>
            <div class="hm-cell hm-3" style="width:12px;height:12px;display:inline-block"></div>
            <div class="hm-cell hm-4" style="width:12px;height:12px;display:inline-block"></div> More
          </div>
        </div>

        <!-- Body snapshot -->
        ${latestMs?`<div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">📏 Latest Body Snapshot (${latestMs.date||'—'})</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px">
            ${[['Weight',latestMs.weight,'kg','var(--accent)'],['BMI',bmi,'','bmi>=25?var(--yellow)':bmi>=30?'var(--red)':'var(--green)'],['Body Fat',latestMs.bodyFat,'%','var(--blue)'],['Chest',latestMs.chest,'cm','var(--muted)'],['Waist',latestMs.waist,'cm','var(--muted)'],['Arms',latestMs.arms,'cm','var(--muted)']].filter(r=>r[1]).map(([lbl,val,unit,col])=>`
              <div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px;text-align:center">
                <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:${typeof col==='string'?col:'var(--accent)'}">${val}${unit?'<span style="font-size:13px">'+unit+'</span>':''}</div>
                <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">${lbl}</div>

        </div>`:''}
      </div>

      <div id="cjp-journey" class="cj-panel">

          <td style="font-size:12px">${s.date||'—'}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)">${to12h(s.time)}</td>

          <td><button class="btn btn-bl btn-sm" onclick="document.getElementById('cj-overlay').remove();setTimeout(()=>openSessionDetail('${s.id}'),200)">📋 Detail</button></td>
        </tr>`).join('')}
        </tbody></table></div>`}
      </div>

      <!-- ④ BODY STATS ─────────────────────────────────────── -->
      <div id="cjp-body" class="cj-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
          <div style="font-size:13px;font-weight:700">Body Measurements (${measurements.length} records)</div>
          ${CR!=='client'?`<button class="btn btn-p btn-sm" onclick="openAddMeasurementFromJourney('${clientId}','${(c.name||'').replace(/'/g,"\\'")}')">+ Add</button>`:''}
        </div>
        ${measurements.length===0?emptyState('📏','No measurements yet','','',''):

        ${measurements.length>=2?buildProgressComparison(measurements):''}

          <th>Date</th><th>Weight</th><th>BMI</th><th>Chest</th><th>Waist</th><th>Hips</th><th>Arms</th><th>Body Fat</th><th></th>

        ${measurements.map(m=>{const b=m.weight&&m.height?((m.weight/((m.height/100)**2)).toFixed(1)):'—';const bc=b==='—'?'var(--muted)':Number(b)<18.5?'var(--blue)':Number(b)<25?'var(--green)':Number(b)<30?'var(--yellow)':'var(--red)';
          return`<tr>
            <td style="font-size:12px">${m.date||'—'}</td>

            <td>${m.chest||'—'}</td><td>${m.waist||'—'}</td><td>${m.hips||'—'}</td>
            <td>${m.arms||'—'}</td><td>${m.bodyFat?m.bodyFat+'%':'—'}</td>

          </tr>`;}).join('')}
        </tbody></table></div>`}
      </div>

      <!-- ⑤ DIET PLAN ──────────────────────────────────────── -->
      <div id="cjp-diet" class="cj-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
          <div style="font-size:13px;font-weight:700">Nutrition & Diet Plan</div>
          ${CR!=='client'?`<button class="btn btn-p btn-sm" onclick="openClientDiet('${clientId}','${(c.name||'').replace(/'/g,"\\'")}')">✏️ Edit Plan</button>`:''}

          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px">
            ${[['🔥 Calories',diet.calories,'kcal'],['💪 Protein',diet.protein,'g'],['🍞 Carbs',diet.carbs,'g'],['🥑 Fat',diet.fat,'g']].map(([lbl,val,unit])=>val?`
              <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">

                <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent)">${val}</div>
                <div style="font-size:10px;color:var(--muted)">${unit}/day</div>
              </div>`:'').join('')}
          </div>
          ${diet.mealPlan?`<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Meal Plan</div><div style="font-size:13px;white-space:pre-wrap;line-height:1.6">${diet.mealPlan}</div></div>`:''}

// ── TIMELINE BUILDER ───────────────────────────────────────────
function buildTimeline(c,sessions,attendance,measurements,checkins){
  const events=[];

  // Start event
  if(c.startDate){
    events.push({date:c.startDate,type:'start',icon:'🚀',title:'Journey Begins',body:`Started ${c.plan||'—'} Plan with trainer ${c.trainerName||'—'}. Goal: ${c.goal||'—'}`,color:'var(--accent)'});
  }

  // Sessions
  sessions.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(s=>{
    const icon=s.status==='completed'?'✅':s.status==='missed'?'❌':s.status==='onair'?'🟢':'📅';
    const color=s.status==='completed'?'var(--green)':s.status==='missed'?'var(--red)':s.status==='onair'?'var(--accent)':'var(--muted)';
    events.push({date:s.date||'',type:'session',icon,title:`${s.type||'Session'} — ${s.status?.replace('-',' ')}`,body:`With ${s.trainerName||'—'} at ${to12h(s.time)}`,color,badge:statusBadge(s.status)});
  });

  // Measurements
  measurements.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(m=>{
    const bmi=m.weight&&m.height?((m.weight/((m.height/100)**2)).toFixed(1)):null;
    events.push({date:m.date||'',type:'measurement',icon:'📏',title:'Body Measurement Logged',body:`Weight: ${m.weight?m.weight+'kg':'—'} · Height: ${m.height?m.height+'cm':'—'}${bmi?` · BMI: ${bmi}`:''}${m.bodyFat?` · Body Fat: ${m.bodyFat}%`:''}`,color:'var(--blue)'});
  });

  // QR Checkins
  checkins.forEach(ch=>{
    events.push({date:ch.sessionDate||'',type:'qr',icon:'📱',title:'QR Code Check-in',body:`Scanned QR code for attendance at ${to12h(ch.sessionDate||'')}`,color:'var(--purple)'});
  });

  // Sort all by date
  events.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  if(!events.length)return'';

  return events.map((e,i)=>`
    <div class="tl-item" style="animation-delay:${i*.06}s">
      <div class="tl-dot" style="background:${e.color}"></div>
      <div class="tl-date">${e.date||'—'}</div>
      <div class="tl-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:18px">${e.icon}</span>
          <div class="tl-title">${e.title}</div>
          ${e.badge?e.badge:''}
        </div>
        <div class="tl-body">${e.body}</div>
      </div>
    </div>`).join('');
}

// ── HEATMAP ────────────────────────────────────────────────────
function buildHeatmap(sessions,attendance){
  const today=new Date();const weeks=12;const days=weeks*7;
  const dateMap={};
  const start=new Date(today);start.setDate(start.getDate()-days);
  sessions.forEach(s=>{if(s.date&&s.status==='completed')dateMap[s.date]=(dateMap[s.date]||0)+2;});
  attendance.forEach(a=>{if(a.date&&a.status==='present')dateMap[a.date]=(dateMap[a.date]||0)+1;});
  const cells=[];
  for(let i=0;i<days;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const key=d.toISOString().split('T')[0];
    const val=dateMap[key]||0;
    const lvl=val===0?0:val===1?1:val===2?2:val<=3?3:4;
    cells.push(`<div class="hm-cell hm-${lvl}" title="${key}: ${val} activities"></div>`);
  }
  const days_labels=['S','M','T','W','T','F','S'];
  return`<div style="display:flex;gap:3px">
    <div style="display:flex;flex-direction:column;gap:3px;margin-right:4px;padding-top:2px">
      ${days_labels.map(d=>`<div style="font-size:9px;color:var(--muted);height:16px;display:flex;align-items:center">${d}</div>`).join('')}
    </div>
    <div style="flex:1;overflow-x:auto">
      <div style="display:grid;grid-template-rows:repeat(7,16px);grid-auto-flow:column;gap:3px;min-width:max-content">${cells.join('')}</div>
    </div>
  </div>`;
}

// ── PROGRESS COMPARISON ────────────────────────────────────────
function buildProgressComparison(measurements){
  const first=measurements[measurements.length-1];
  const latest=measurements[0];
  const fields=[['⚖️ Weight','weight','kg'],['📐 Waist','waist','cm'],['💪 Arms','arms','cm'],['🦵 Thighs','thighs','cm']];
  return`<div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;margin-bottom:14px">📈 Progress: First vs Latest</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${fields.filter(([,key])=>first[key]&&latest[key]).map(([icon,key,unit])=>{
        const diff=parseFloat(latest[key])-parseFloat(first[key]);
        const better=key==='waist'||key==='thighs'||key==='weight'?diff<0:diff>0;
        const diffStr=(diff>=0?'+':'')+diff.toFixed(1)+unit;
        return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${icon}</div>
          <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:6px">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent)">${latest[key]}<span style="font-size:14px">${unit}</span></div>
            <div style="font-size:11px;color:${better?'var(--green)':'var(--red)'};font-weight:700;margin-bottom:4px">${diffStr}</div>
          </div>
          <div style="font-size:10px;color:var(--muted)">Was ${first[key]}${unit} → Now ${latest[key]}${unit}</div>
        </div>`;}).join('')}
    </div>
  </div>`;
}

// ── STREAK CALCULATOR ──────────────────────────────────────────
function calcStreak(attendance){
  if(!attendance.length)return 0;
  const presentDates=new Set(attendance.filter(a=>a.status==='present').map(a=>a.date));
  let streak=0;const today=new Date();
  for(let i=0;i<60;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    if(presentDates.has(key))streak++;
    else if(i>0)break;
  }
  return streak;
}

async function saveClient(existingId=''){
  const name=$('cf-name').value.trim(),phone=$('cf-phone').value.trim();
  if(!name||!phone){toast('Name and phone are required','error');return;}
  const plan=$('cf-plan').value;
  const data={name,phone,email:$('cf-email').value.trim(),plan,dob:document.getElementById('cf-dob')?.value||'',
    trainerId:document.getElementById('cf-trainer-id')?.value||'',
    trainerName:($('cf-trainer-inp')?.value||'').replace(/\s*\([^)]*\)\s*$/,'').trim()||'',
    coordinatorId:document.getElementById('cf-coord-id')?.value||'',
    coordinatorName:$('cf-coord-inp')?.value.trim()||'',
    gender:$('cf-gender').value,goal:$('cf-goal').value,
    weight:null,height:null,
    startDate:$('cf-start').value,endDate:$('cf-end').value,
    medical:$('cf-med').value,active:$('cf-active').value==='true',
    sessionsPerWeek:$('cf-spw').value,city:$('cf-city').value.trim(),
    company:$('cf-company').value.trim(),
    country:$('cf-country')?.value.trim()||'',
    age:Number($('cf-age')?.value)||null,addedBy:auth().currentUser.uid};
  if(plan==='Couple'){data.partnerName=document.getElementById('cf-partner-name')?.value.trim()||'';data.partnerPhone=document.getElementById('cf-partner-phone')?.value.trim()||'';}
  try{
    if(existingId){await fsUpdate('clients',existingId,data);toast('Client updated! ✅','success');}
    else{await fsAdd('clients',data);toast('Client added! ✅','success');}
    closeM2();clients();
  }catch(e){toast('Error: '+e.message,'error');}
}
async function delClient(id){
