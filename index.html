async function attendance(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  let q=[];if(CR==='client')q=[fn().where('clientId','==',auth().currentUser.uid)];
  const data=await fsGetAll('attendance',...q);
  data.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  window._attendanceData=data;

  const present=data.filter(a=>a.status==='present').length;
  const absent=data.filter(a=>a.status==='absent').length;
  const late=data.filter(a=>a.status==='late').length;

  $('page').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div></div>
      ${CR!=='client'?`<button class="btn btn-p" onclick="openMarkAttendance()">+ Mark Attendance</button>`:''}
    </div>

    <div class="stats-grid">
      <div class="sc sc-g"><div class="sc-ico">✅</div><div class="sc-lbl">Present</div><div class="sc-val">${present}</div></div>
      <div class="sc sc-r"><div class="sc-ico">❌</div><div class="sc-lbl">Absent</div><div class="sc-val">${absent}</div></div>
      <div class="sc sc-y"><div class="sc-ico">⏰</div><div class="sc-lbl">Late</div><div class="sc-val">${late}</div></div>
      <div class="sc sc-a"><div class="sc-ico">📊</div><div class="sc-lbl">Rate</div><div class="sc-val">${data.length?Math.round(present/data.length*100):0}%</div></div>
    </div>

    <!-- Filter bar -->
    <div class="card" style="padding:12px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">From</span>
          <input class="fi" type="date" id="at-filter-from" style="max-width:148px;margin:0;padding:8px 10px;font-size:12px" onchange="filterAttendanceByDate()">
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">To</span>
          <input class="fi" type="date" id="at-filter-to" style="max-width:148px;margin:0;padding:8px 10px;font-size:12px" onchange="filterAttendanceByDate()">
        </div>
        <select class="fs" id="at-filter-status" style="max-width:148px;padding:8px 10px;font-size:12px" onchange="filterAttendanceByDate()">
          <option value="">All Statuses</option>
          <option value="present">✅ Present</option>
          <option value="absent">❌ Absent</option>
          <option value="late">⏰ Late</option>
        </select>
        <input class="fi" type="text" id="at-filter-search" placeholder="🔍 Client / Trainer…" style="max-width:200px;margin:0;padding:8px 10px;font-size:12px" oninput="filterAttendanceByDate()">
        <button class="btn btn-g btn-sm" onclick="
          $('at-filter-from').value='';
          $('at-filter-to').value='';
          $('at-filter-status').value='';
          $('at-filter-search').value='';
          filterAttendanceByDate()
        ">✕ Clear</button>
      </div>
    </div>

    <div class="card" style="padding:0">
      <div class="tbl-wrap" id="at-table">
        ${renderAttendanceTable(data)}
      </div>
    </div>`;
}

function renderAttendanceTable(data){
  if(!data.length) return emptyState('✅','No records','Attendance will appear here.',CR!=='client'?'+ Mark Attendance':'',CR!=='client'?'openMarkAttendance()':'');
  return`<table><thead><tr>
    <th>Date</th><th>Client</th><th>Trainer</th><th>Session</th><th>Status</th><th>Reason</th>
    ${CR!=='client'?'<th>Actions</th>':''}
  </tr></thead><tbody>
  ${data.map(a=>`<tr>
    <td style="font-size:12px">${a.date||'—'}</td>
    <td><strong>${a.clientName||'—'}</strong></td>
    <td style="font-size:12px">${a.trainerName||'—'}</td>
    <td style="font-size:12px">${a.sessionType||'—'}</td>
    <td>${statusBadge(a.status)}</td>
    <td style="font-size:12px">${a.reason||'—'}</td>
    ${CR!=='client'?`<td><div class="td-actions">
      <button class="btn btn-g btn-sm" onclick="openEditAttend('${a.id}')">Edit</button>
      <button class="btn btn-d btn-sm" onclick="delAttend('${a.id}')">Delete</button>
    </div></td>`:''}
  </tr>`).join('')}
  </tbody></table>`;
}

function filterAttendanceByDate(){
  const from=$('at-filter-from')?.value;
  const to=$('at-filter-to')?.value;
  const status=$('at-filter-status')?.value||'';
  const search=($('at-filter-search')?.value||'').toLowerCase().trim();
  let data=window._attendanceData||[];
  if(from)data=data.filter(a=>(a.date||'')>=from);
  if(to)data=data.filter(a=>(a.date||'')<=to);
  if(status)data=data.filter(a=>a.status===status);
  if(search)data=data.filter(a=>(a.clientName||'').toLowerCase().includes(search)||(a.trainerName||'').toLowerCase().includes(search));
  const tbl=$('at-table');
  if(tbl)tbl.innerHTML=renderAttendanceTable(data);
}

  document.head.appendChild(s);
}

// ── PRESENCE HELPERS ─────────────────────────────────────────
async function setPresenceOnline(){
  if(!auth().currentUser)return;
  try{
    await fn().setDoc(fn().doc(db(),'presence',auth().currentUser.uid),{
      uid:auth().currentUser.uid,name:CU.name||CU.email||'',role:CR,
      online:true,lastSeen:fn().serverTimestamp()
    },{merge:true});
  }catch(e){}
}
async function setPresenceOffline(){
  if(!auth().currentUser)return;
  try{await fn().updateDoc(fn().doc(db(),'presence',auth().currentUser.uid),{online:false,lastSeen:fn().serverTimestamp()});}catch(e){}
}
function listenPresence(){
  if(_presenceUnsub){_presenceUnsub();_presenceUnsub=null;}
  try{
    _presenceUnsub=fn().onSnapshot(fn().collection(db(),'presence'),snap=>{
      _onlineUsers=new Set();
      snap.forEach(d=>{if(d.data().online)_onlineUsers.add(d.id);});
      // refresh presence dots in sidebar
      document.querySelectorAll('.presence-dot').forEach(dot=>{
        const uid=dot.dataset.uid;
        if(uid)dot.className=`presence-dot ${_onlineUsers.has(uid)?'online':'offline'}`;
      });
      document.querySelectorAll('.online-badge[data-uid]').forEach(b=>{
        const uid=b.dataset.uid;
        if(uid)b.className=`online-badge ${_onlineUsers.has(uid)?'online':'offline'}`;
      });
      // update header status line
      const sl=$('chat-status-line');
      if(sl&&_activeChatContactId){
        const isOnline=_onlineUsers.has(_activeChatContactId);
        sl.innerHTML=isOnline?`<span style="color:var(--green);font-size:11px">● Online now</span>`:`<span style="color:var(--muted);font-size:11px">○ Offline</span>`;
      }
    });
  }catch(e){}
}

// ── MAIN CHAT FUNCTION ────────────────────────────────────────
async function chat(){
  $('page').innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)"><div class="spin" style="width:28px;height:28px;margin:0 auto"></div></div>`;
  injectChatStyles();
  if(_chatUnsub){_chatUnsub();_chatUnsub=null;}
  if(_typingUnsub){_typingUnsub();_typingUnsub=null;}
  await setPresenceOnline();
  listenPresence();

  const myUid=auth().currentUser.uid;
  _chatMyUid=myUid;
  _activeChatId='';_activeChatContactId='';_activeGroupId=null;

  let contacts=[];
  if(CR==='trainer'){
    const[myClients,coords,heads,admins]=await Promise.all([
      fsGetAll('clients',fn().where('trainerId','==',myUid),fn().where('active','==',true)),
      fsGetAll('users',fn().where('role','==','coordinator')),
      fsGetAll('users',fn().where('role','==','coordinatorhead')),
      fsGetAll('users',fn().where('role','==','admin'))
    ]);
    contacts=[...myClients.map(c=>({...c,_chatRole:'client',_chatLabel:'Client'})),
              ...coords.map(u=>({...u,_chatRole:'coordinator',_chatLabel:'Coordinator'})),
              ...heads.map(u=>({...u,_chatRole:'coordinatorhead',_chatLabel:'Coord. Head'})),
              ...admins.map(u=>({...u,_chatRole:'admin',_chatLabel:'Admin'}))];
  }else if(CR==='client'){
    const myDocs=await fsGetAll('clients',fn().where('email','==',CU.email));
    const myDoc=myDocs[0];
    if(myDoc?.trainerId){const t=await fsGet('users',myDoc.trainerId);if(t)contacts=[{...t,_chatRole:'trainer',_chatLabel:'Your Trainer'}];}
  }else if(CR==='coordinator'){
    const[trainers,heads,admins]=await Promise.all([
      fsGetAll('users',fn().where('role','==','trainer')),
      fsGetAll('users',fn().where('role','==','coordinatorhead')),
      fsGetAll('users',fn().where('role','==','admin'))
    ]);
    contacts=[...trainers.map(u=>({...u,_chatRole:'trainer',_chatLabel:'Trainer'})),
              ...heads.map(u=>({...u,_chatRole:'coordinatorhead',_chatLabel:'Coord. Head'})),
              ...admins.map(u=>({...u,_chatRole:'admin',_chatLabel:'Admin'}))];
  }else if(CR==='coordinatorhead'){
    const[coords,trainers,admins]=await Promise.all([
      fsGetAll('users',fn().where('role','==','coordinator')),
      fsGetAll('users',fn().where('role','==','trainer')),
      fsGetAll('users',fn().where('role','==','admin'))
    ]);
    contacts=[...coords.map(u=>({...u,_chatRole:'coordinator',_chatLabel:'Coordinator'})),
              ...trainers.map(u=>({...u,_chatRole:'trainer',_chatLabel:'Trainer'})),
              ...admins.map(u=>({...u,_chatRole:'admin',_chatLabel:'Admin'}))];
  }else if(CR==='admin'){
    const[trainers,coords,heads]=await Promise.all([
      fsGetAll('users',fn().where('role','==','trainer')),
      fsGetAll('users',fn().where('role','==','coordinator')),
      fsGetAll('users',fn().where('role','==','coordinatorhead'))
    ]);
    contacts=[...trainers.map(u=>({...u,_chatRole:'trainer',_chatLabel:'Trainer'})),
              ...coords.map(u=>({...u,_chatRole:'coordinator',_chatLabel:'Coordinator'})),
              ...heads.map(u=>({...u,_chatRole:'coordinatorhead',_chatLabel:'Coord. Head'}))];
  }
  contacts=contacts.filter(c=>c.id!==myUid);
  _chatContacts=contacts;

  // Load unread counts
  _unreadCounts={};
  await Promise.all(contacts.map(async c=>{
    const chatId=getChatId(myUid,c.id);
    try{
      const q=fn().query(fn().collection(db(),`chats/${chatId}/messages`),fn().where('senderId','!=',myUid),fn().where('read','==',false));
      const snap=await fn().getDocs(q);
      if(snap.size>0)_unreadCounts[c.id]=snap.size;
    }catch(e){}
  }));

  $('page').innerHTML=`
  <div class="chat-layout" id="chat-layout">
    <!-- SIDEBAR -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-tabs">
        <div class="chat-sidebar-tab active" id="stab-dm" onclick="switchSidebarTab('dm')">💬 DMs</div>
        <div class="chat-sidebar-tab" id="stab-groups" onclick="switchSidebarTab('groups')">👥 Groups</div>
        <div class="chat-sidebar-tab" id="stab-online" onclick="switchSidebarTab('online')">🟢 Online</div>
      </div>
      <div style="padding:8px 10px;border-bottom:1px solid var(--border)">
        <input class="fi" id="chat-search-inp" placeholder="🔍 Search…" style="margin:0;padding:7px 10px;font-size:12px" oninput="filterChatContacts()">
      </div>
      <!-- DM list -->
      <div class="chat-list" id="sidebar-dm">${buildDMList(contacts,myUid)}</div>
      <!-- Groups list -->
      <div class="chat-list" id="sidebar-groups" style="display:none"></div>
      <!-- Online list -->
      <div class="chat-list" id="sidebar-online" style="display:none"></div>
    </div>

    <!-- MAIN AREA -->
    <div class="chat-main" id="chat-main">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted)">
        <div style="font-size:52px">💬</div>
        <div style="font-weight:700;font-size:16px;color:var(--text)">Your Messages</div>
        <div style="font-size:13px">Select a conversation or group to start chatting</div>
        ${CR==='admin'||CR==='coordinatorhead'||CR==='coordinator'?`<button class="btn btn-p btn-sm" onclick="switchSidebarTab('groups');openCreateGroup()">+ Create Group</button>`:''}
      </div>
    </div>
  </div>`;

  // load groups sidebar
  loadGroupsSidebar();
}

// ── SIDEBAR TABS ─────────────────────────────────────────────
function switchSidebarTab(tab){
  ['dm','groups','online'].forEach(t=>{
    const tabEl=$(`stab-${t}`);const panelEl=$(`sidebar-${t}`);
    if(tabEl)tabEl.classList.toggle('active',t===tab);
    if(panelEl)panelEl.style.display=t===tab?'block':'none';
  });
  if(tab==='online')renderOnlinePanel();
}

// ── DM LIST ──────────────────────────────────────────────────
function buildDMList(contacts,myUid){
  if(!contacts.length)return`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No contacts</div>`;
  return contacts.map(c=>{
    const rc=roleColorForChat(c._chatRole||c.role);
    const ini=(c.name||c.email||'?')[0].toUpperCase();
    const unread=_unreadCounts[c.id]||0;
    const isOnline=_onlineUsers.has(c.id);
    return`<div class="chat-item" id="ci-${c.id}" onclick="openChatWith('${c.id}','${(c.name||c.email||'').replace(/'/g,"\\'")}','${c._chatLabel||c.role}','${c._chatRole||c.role}')">
      <div style="position:relative;flex-shrink:0">
        <div style="width:38px;height:38px;border-radius:50%;background:${rc.bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:${rc.fg}">${ini}</div>
        <div class="presence-dot ${isOnline?'online':'offline'}" data-uid="${c.id}"></div>
      </div>
      <div style="min-width:0;flex:1">
        <div class="chat-item-name">${c.name||c.email||'—'}</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:${rc.fg};margin-top:1px">${c._chatLabel||c.role}</div>
      </div>
      ${unread>0?`<div class="unread-badge">${unread>99?'99+':unread}</div>`:''}
    </div>`;
  }).join('');
}

function filterChatContacts(){
  const v=($('chat-search-inp')?.value||'').toLowerCase();
  const filtered=(_chatContacts||[]).filter(c=>(c.name||'').toLowerCase().includes(v)||(c.email||'').toLowerCase().includes(v));
  const list=$('sidebar-dm');
  if(list)list.innerHTML=buildDMList(filtered,_chatMyUid);
}

function roleColorForChat(role){
  const m={admin:'var(--purple)',coordinatorhead:'var(--orange)',coordinator:'var(--blue)',trainer:'var(--green)',client:'var(--yellow)'};
  const fg=m[role]||'var(--muted)';
  return{fg,bg:fg.replace('var(--','rgba(').replace(')',',0.15)').replace('rgba(purple','rgba(170,102,255').replace('rgba(orange','rgba(255,140,0').replace('rgba(blue','rgba(77,159,255').replace('rgba(green','rgba(0,230,118').replace('rgba(yellow','rgba(255,187,0').replace('rgba(muted','rgba(136,136,136')};
}

// ── ONLINE PANEL ─────────────────────────────────────────────
function renderOnlinePanel(){
  const panel=$('sidebar-online');if(!panel)return;
  const onlineContacts=(_chatContacts||[]).filter(c=>_onlineUsers.has(c.id));
  if(!onlineContacts.length){
    panel.innerHTML=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No one online right now</div>`;return;
  }
  panel.innerHTML=`<div class="online-panel">
    <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin-bottom:10px">● ${onlineContacts.length} Online Now</div>
    ${onlineContacts.map(c=>{
      const rc=roleColorForChat(c._chatRole||c.role);
      const ini=(c.name||c.email||'?')[0].toUpperCase();
      return`<div class="online-user-row" onclick="openChatWith('${c.id}','${(c.name||c.email||'').replace(/'/g,"\\'")}','${c._chatLabel||c.role}','${c._chatRole||c.role}');switchSidebarTab('dm')" style="cursor:pointer">
        <div style="width:32px;height:32px;border-radius:50%;background:${rc.bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:${rc.fg};flex-shrink:0">${ini}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px">${c.name||c.email||'—'}</div>
          <div style="font-size:10px;color:var(--green)">● Active now</div>
        </div>
        <div style="width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0"></div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── GROUP CHAT ────────────────────────────────────────────────
async function loadGroupsSidebar(){
  const panel=$('sidebar-groups');if(!panel)return;
  try{
    const myUid=_chatMyUid||auth().currentUser.uid;
    const groups=await fsGetAll('groupchats',fn().where('memberIds','array-contains',myUid));
    groups.sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0));
    const canCreate=CR==='admin'||CR==='coordinatorhead'||CR==='coordinator';
    panel.innerHTML=`
      ${canCreate?`<div style="padding:10px 12px;border-bottom:1px solid var(--border)"><button class="btn btn-p btn-sm btn-w" onclick="openCreateGroup()">+ Create Group</button></div>`:''}
      ${groups.length===0?`<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No groups yet${canCreate?'<br><span style="font-size:12px">Create one above</span>':''}</div>`
      :groups.map(g=>`<div class="chat-item ${_activeGroupId===g.id?'active':''}" id="gci-${g.id}" onclick="openGroupChat('${g.id}','${(g.name||'Group').replace(/'/g,"\\'")}')">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--purple-dim);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">👥</div>
        <div style="min-width:0;flex:1">
          <div class="chat-item-name">${g.name||'Unnamed Group'}</div>
          <div class="chat-item-preview">${g.memberIds?.length||0} members${g.lastMessage?` · ${(g.lastMessage||'').substring(0,20)}`:''}</div>
        </div>
      </div>`).join('')}`;
  }catch(e){const panel=$('sidebar-groups');if(panel)panel.innerHTML=`<div style="padding:16px;font-size:12px;color:var(--muted)">Could not load groups</div>`;}
}

function openCreateGroup(){
  const contacts=_chatContacts||[];
  openM2('CREATE GROUP CHAT',`
    <div class="fg"><label class="fl">Group Name *</label><input class="fi" id="grp-name" placeholder="e.g. Morning Team, Corporate Batch…"></div>
    <div class="fg"><label class="fl">Group Description</label><input class="fi" id="grp-desc" placeholder="What is this group for?"></div>
    <div class="fg"><label class="fl">Add Members *</label>
      <div style="max-height:220px;overflow-y:auto;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px">
        <div style="margin-bottom:8px;display:flex;gap:6px">
          <button class="btn btn-g btn-sm" onclick="document.querySelectorAll('.grp-chk').forEach(c=>c.checked=true)">All</button>
          <button class="btn btn-g btn-sm" onclick="document.querySelectorAll('.grp-chk').forEach(c=>c.checked=false)">None</button>
        </div>
        ${contacts.map(c=>`<label style="display:flex;align-items:center;gap:8px;padding:7px;cursor:pointer;border-radius:7px;transition:background .15s" onmouseover="this.style.background='var(--card)'" onmouseout="this.style.background=''">
          <input type="checkbox" class="grp-chk" value="${c.id}" data-name="${(c.name||c.email||'').replace(/"/g,'&quot;')}">
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${c.name||c.email||'—'}</div><div style="font-size:10px;color:var(--muted)">${c._chatLabel||c.role||''}</div></div>
        </label>`).join('')}
      </div>
    </div>
    <div id="grp-err" class="alert alert-err"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM2()">Cancel</button><button class="btn btn-p" onclick="saveCreateGroup()">Create Group</button></div>`);
}

async function saveCreateGroup(){
  const name=$('grp-name')?.value.trim();
  const desc=$('grp-desc')?.value.trim()||'';
  const checked=[...document.querySelectorAll('.grp-chk:checked')].map(c=>({id:c.value,name:c.dataset.name}));
  const errEl=$('grp-err');errEl.classList.remove('show');
  if(!name){errEl.textContent='Group name is required.';errEl.classList.add('show');return;}
  if(!checked.length){errEl.textContent='Select at least one member.';errEl.classList.add('show');return;}
  const myUid=_chatMyUid||auth().currentUser.uid;
  const memberIds=[myUid,...checked.map(c=>c.id)];
  const memberNames={[myUid]:CU.name||CU.email||''};
  checked.forEach(c=>{memberNames[c.id]=c.name||'';});
  try{
    const ref=await fsAdd('groupchats',{name,description:desc,memberIds,memberNames,createdBy:myUid,createdByName:CU.name||'',lastMessage:'',avatar:'👥'});
    // System message
    await fn().addDoc(fn().collection(db(),`groupchats/${ref.id}/messages`),{
      senderId:'system',senderName:'System',message:`Group "${name}" created by ${CU.name||'Admin'}`,
      timestamp:fn().serverTimestamp(),type:'system',read:false
    });
    closeM2();toast('✅ Group created!','success');
    loadGroupsSidebar();
    switchSidebarTab('groups');
  }catch(e){errEl.textContent='Error: '+e.message;errEl.classList.add('show');}
}

async function openGroupChat(groupId,groupName){
  _activeGroupId=groupId;
  _activeChatId=`group_${groupId}`;
  _activeChatContactId='';
  if(_chatUnsub){_chatUnsub();_chatUnsub=null;}
  if(_typingUnsub){_typingUnsub();_typingUnsub=null;}
  document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active'));
  const gci=$(`gci-${groupId}`);if(gci)gci.classList.add('active');

  const myUid=_chatMyUid||auth().currentUser.uid;
  let groupData={};
  try{const snap=await fn().getDoc(fn().doc(db(),'groupchats',groupId));if(snap.exists())groupData=snap.data();}catch(e){}

  const memberCount=groupData.memberIds?.length||0;
  const isAdmin2=groupData.createdBy===myUid||CR==='admin';

  $('chat-main').innerHTML=`
    <div class="chat-header">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--purple-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">👥</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px">${groupName}</div>
        <div id="chat-status-line" style="font-size:11px;color:var(--muted)">${memberCount} members${groupData.description?` · ${groupData.description}`:''}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${isAdmin2?`<button class="btn btn-g btn-sm" onclick="manageGroup('${groupId}','${groupName.replace(/'/g,"\\'")}')">⚙ Manage</button>`:''}
      </div>
    </div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="typing-wrap" id="typing-wrap" style="display:none;padding:0 16px 6px">
      <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
    </div>
    ${buildInputArea(groupId,myUid,'',true)}`;

  setupInputListeners(groupId,myUid,'',true);
  listenGroupTyping(groupId,myUid);

  try{
    const msgsRef=fn().collection(db(),`groupchats/${groupId}/messages`);
    const q=fn().query(msgsRef,fn().orderBy('timestamp','asc'));
    _chatUnsub=fn().onSnapshot(q,snapshot=>{
      const msgs=$('chat-msgs');if(!msgs)return;
      const atBottom=msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight<80;
      msgs.innerHTML='';
      snapshot.forEach(docSnap=>{
        const m={id:docSnap.id,...docSnap.data()};
        msgs.appendChild(buildMsgEl(m,myUid,true));
      });
      if(atBottom||snapshot.size===1)msgs.scrollTop=msgs.scrollHeight;
    });
  }catch(e){const msgs=$('chat-msgs');if(msgs)msgs.innerHTML=`<div style="padding:20px;color:var(--red);font-size:13px">⚠️ ${e.message}</div>`;}
}

async function manageGroup(groupId,groupName){
  const snap=await fn().getDoc(fn().doc(db(),'groupchats',groupId));
  if(!snap.exists()){toast('Group not found','error');return;}
  const g=snap.data();
  const memberList=Object.entries(g.memberNames||{}).map(([uid,name])=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="font-weight:600;font-size:13px;flex:1">${name||uid}</div>${uid!==(_chatMyUid||auth().currentUser.uid)?`<button class="btn btn-d btn-sm" onclick="removeMemberFromGroup('${groupId}','${uid}','${(name||'').replace(/'/g,"\\'")}')">Remove</button>`:''}</div>`).join('');
  openM1(`MANAGE: ${groupName}`,`
    <div class="fg"><label class="fl">Group Name</label><input class="fi" id="mg-name" value="${g.name||''}"></div>
    <div class="fg"><label class="fl">Description</label><input class="fi" id="mg-desc" value="${g.description||''}"></div>
    <div style="margin-bottom:14px"><label class="fl" style="margin-bottom:8px">Members (${Object.keys(g.memberNames||{}).length})</label><div style="max-height:180px;overflow-y:auto">${memberList}</div></div>
    <div class="mo-foot">
      <button class="btn btn-d btn-sm" onclick="deleteGroup('${groupId}')">🗑 Delete Group</button>
      <button class="btn btn-g" onclick="closeM1()">Cancel</button>
      <button class="btn btn-p" onclick="updateGroup('${groupId}')">Save</button>
    </div>`);
}
async function updateGroup(groupId){
  const name=$('mg-name')?.value.trim();const desc=$('mg-desc')?.value.trim()||'';
  if(!name){toast('Name required','error');return;}
  try{await fsUpdate('groupchats',groupId,{name,description:desc});closeM1();toast('Updated!','success');loadGroupsSidebar();}
  catch(e){toast('Error: '+e.message,'error');}
}
async function removeMemberFromGroup(groupId,uid,name){
  if(!confirm(`Remove ${name} from group?`))return;
  try{
    const snap=await fn().getDoc(fn().doc(db(),'groupchats',groupId));
    if(!snap.exists())return;
    const g=snap.data();
    const newIds=(g.memberIds||[]).filter(i=>i!==uid);
    const newNames={...g.memberNames};delete newNames[uid];
    await fn().updateDoc(fn().doc(db(),'groupchats',groupId),{memberIds:newIds,memberNames:newNames});
    toast(`${name} removed`,'success');closeM1();
  }catch(e){toast('Error','error');}
}
async function deleteGroup(groupId){
  if(!confirm('Delete this group permanently?'))return;
  try{await fsDel('groupchats',groupId);closeM1();toast('Group deleted','success');loadGroupsSidebar();$('chat-main').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px">Group deleted</div>`;}
  catch(e){toast('Error','error');}
}

// ── OPEN DM ───────────────────────────────────────────────────
function getChatId(uid1,uid2){return[uid1,uid2].sort().join('_');}

async function openChatWith(contactId,contactName,contactRole,rawRole){
  document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active'));
  const ci=$(`ci-${contactId}`);if(ci)ci.classList.add('active');
  if(_chatUnsub){_chatUnsub();_chatUnsub=null;}
  if(_typingUnsub){_typingUnsub();_typingUnsub=null;}

  const myUid=_chatMyUid||auth().currentUser.uid;
  const chatId=getChatId(myUid,contactId);
  _activeChatId=chatId;_activeChatContactId=contactId;_activeGroupId=null;

  const rc=roleColorForChat(rawRole);
  const ini=(contactName||'?')[0].toUpperCase();
  const isOnline=_onlineUsers.has(contactId);

  $('chat-main').innerHTML=`

// ── MESSAGE ELEMENT ───────────────────────────────────────────
function buildMsgEl(m,myUid,isGroup){
  const isMe=m.senderId===myUid;
  const isSystem=m.senderId==='system'||m.type==='system';
  const ts=m.timestamp?fmtFullTime(m.timestamp):'';

  const wrap=document.createElement('div');
  if(isSystem){
    wrap.className='msg-system';
    wrap.textContent=m.message||'';
    return wrap;
  }

  wrap.className=`msg-wrap ${isMe?'out':'in'}`;

  // Sender label for group chats
  if(isGroup&&!isMe&&m.senderName){
    const lbl=document.createElement('div');
    lbl.className='msg-sender-lbl';lbl.textContent=m.senderName;
    wrap.appendChild(lbl);
  }

  const msgDiv=document.createElement('div');
  msgDiv.className=`msg ${isMe?'msg-out':'msg-in'}`;

  if(m.type==='image'&&m.fileUrl){
    msgDiv.innerHTML=`<img src="${m.fileUrl}" class="msg-img" onclick="window.open('${m.fileUrl}','_blank')" alt="Image">
      <div class="msg-meta"><span>${ts}</span>${isMe?`<span class="read-tick ${m.read?'read':''}">✓${m.read?'✓':''}</span>`:''}</div>`;
  }else if(m.type==='file'&&m.fileUrl){
    const ext=(m.fileName||'').split('.').pop().toUpperCase();
    const fileIcons={PDF:'📄',DOC:'📝',DOCX:'📝',XLS:'📊',XLSX:'📊',PPT:'📋',ZIP:'📦',MP4:'🎥',MP3:'🎵'};
    const icon=fileIcons[ext]||'📎';
    msgDiv.innerHTML=`<a href="${m.fileUrl}" target="_blank" class="msg-file" style="${isMe?'color:#000':''}">
      <span class="msg-file-icon">${icon}</span>
      <div class="msg-file-info">
        <div class="msg-file-name">${m.fileName||'File'}</div>
        <div class="msg-file-size">${ext} ${m.fileSize?`· ${(m.fileSize/1024).toFixed(1)}KB`:''}</div>
      </div>
      <span style="font-size:13px;opacity:.7">↗</span>
    </a>
    <div class="msg-meta"><span>${ts}</span>${isMe?`<span class="read-tick ${m.read?'read':''}">✓${m.read?'✓':''}</span>`:''}</div>`;
  }else{
    let txt=m.message||'';
    if(m.type==='missed_session_alert')txt='⚠️ '+txt;
    if(m.type==='missed_reason_report')txt='📋 '+txt;
    if(m.type==='broadcast')txt=txt;
    msgDiv.innerHTML=`<div>${escHtml(txt)}</div>
      <div class="msg-meta">
        <span>${ts}</span>
        ${isMe?`<span class="read-tick ${m.read?'read':''}" title="${m.read?'Read':'Delivered'}">✓${m.read?'✓':''}</span>`:''}
      </div>`;
  }

  wrap.appendChild(msgDiv);
  return wrap;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ── FILE HANDLING ─────────────────────────────────────────────
let _attachedFile=null;

function handleFileSelect(event){
  const file=event.target.files[0];if(!file)return;
  _attachedFile=file;
  const bar=$('file-preview-bar');const nameEl=$('file-preview-name');const iconEl=$('file-preview-icon');
  if(bar)bar.style.display='flex';
  if(nameEl)nameEl.textContent=`${file.name} (${(file.size/1024).toFixed(1)}KB)`;
  const isImg=file.type.startsWith('image/');
  if(iconEl)iconEl.textContent=isImg?'🖼':'📎';
  toast(`📎 ${file.name} attached`,'info');
}

function clearFileAttachment(){
  _attachedFile=null;
  const bar=$('file-preview-bar');if(bar)bar.style.display='none';
  const inp=$('file-inp');if(inp)inp.value='';
}

// Convert file to base64 data URL (stored in Firestore as string — suitable for small files)
// For large files we store file name and size only with a note
async function fileToBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=()=>rej(new Error('Read failed'));
    reader.readAsDataURL(file);
  });
}

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMsg(chatId,myUid,contactId,isGroup){
  const inp=$('chat-inp');if(!inp)return;
  const text=inp.value.trim();
  if(!text&&!_attachedFile)return;
  inp.value='';inp.style.height='auto';
  clearTyping(chatId,myUid);

  const isGrp=isGroup==='true'||isGroup===true;
  const grpId=isGrp?chatId.replace('group_',''):null;
  const collPath=isGrp?`groupchats/${grpId}/messages`:`chats/${chatId}/messages`;

  let msgData={
    senderId:myUid,senderName:CU.name||CU.email||'',
    timestamp:fn().serverTimestamp(),read:false,type:'text',message:text||''
  };

  if(_attachedFile){
    const file=_attachedFile;
    const isImg=file.type.startsWith('image/');
    msgData.type=isImg?'image':'file';
    msgData.fileName=file.name;
    msgData.fileSize=file.size;
    msgData.message=text||'';

    // Only embed if file < 500KB (Firestore 1MB doc limit)
    if(file.size<500*1024){
      try{
        const b64=await fileToBase64(file);
        msgData.fileUrl=b64;
      }catch(e){msgData.fileUrl='';msgData.message=`[Attached: ${file.name}] ${text}`;}
    }else{
      msgData.fileUrl='';
      msgData.message=`📎 [File too large to embed: ${file.name} · ${(file.size/1024/1024).toFixed(1)}MB]\n${text}`;
      msgData.type='text';
      toast('⚠️ File >500KB — sent as text note. Use a link to share large files.','warn');
    }
    clearFileAttachment();
  }

  try{
    await fn().addDoc(fn().collection(db(),collPath),msgData);
    const lastMsg=_attachedFile?`📎 ${_attachedFile?.name||'File'}`:text.length>40?text.substring(0,40)+'…':text;
    if(isGrp){
      await fn().updateDoc(fn().doc(db(),'groupchats',grpId),{lastMessage:lastMsg,lastSenderId:myUid,updatedAt:fn().serverTimestamp()});
    }else{
      await fn().setDoc(fn().doc(db(),'chats',chatId),{
        participants:[myUid,contactId],lastMessage:lastMsg,
        lastMessageTime:fn().serverTimestamp(),lastSenderId:myUid
      },{merge:true});
      // notification
      await createNotifForUsers({
        key:`chat_${chatId}_${Date.now()}`,
        title:`💬 ${CU.name||'Someone'}`,
        body:text||'Sent a file',type:'chat_message'
      },[contactId]);
    }
  }catch(e){toast('Send failed: '+e.message,'error');}
}

// ── TYPING INDICATOR ──────────────────────────────────────────
function handleTyping(chatId,myUid){
  clearTimeout(_typingTimer);
  const isGrp=chatId.startsWith('group_');
  const docPath=isGrp?`groupTyping/${chatId}_${myUid}`:`typing/${chatId}_${myUid}`;
  fn().setDoc(fn().doc(db(),docPath),{uid:myUid,name:CU.name||'',chatId,at:fn().serverTimestamp()},{merge:true}).catch(()=>{});
  _typingTimer=setTimeout(()=>clearTyping(chatId,myUid),3000);
}

function clearTyping(chatId,myUid){
  clearTimeout(_typingTimer);
  const isGrp=chatId.startsWith('group_');
  const docPath=isGrp?`groupTyping/${chatId}_${myUid}`:`typing/${chatId}_${myUid}`;
  fn().deleteDoc(fn().doc(db(),docPath)).catch(()=>{});
}

function listenTypingIndicator(chatId,myUid){
  if(_typingUnsub){_typingUnsub();_typingUnsub=null;}
  try{
    _typingUnsub=fn().onSnapshot(fn().collection(db(),'typing'),snap=>{
      const wrap=$('typing-wrap');if(!wrap)return;
      const someoneTyping=snap.docs.some(d=>d.id.startsWith(chatId)&&d.data().uid!==myUid);
      wrap.style.display=someoneTyping?'flex':'none';
      const msgs=$('chat-msgs');if(msgs&&someoneTyping)msgs.scrollTop=msgs.scrollHeight;
    });
  }catch(e){}
}

function listenGroupTyping(groupId,myUid){
  if(_typingUnsub){_typingUnsub();_typingUnsub=null;}
  try{
    _typingUnsub=fn().onSnapshot(fn().collection(db(),'groupTyping'),snap=>{
      const wrap=$('typing-wrap');if(!wrap)return;
      const typingNames=snap.docs
        .filter(d=>d.data().chatId===`group_${groupId}`&&d.data().uid!==myUid)
        .map(d=>d.data().name||'Someone');
      wrap.style.display=typingNames.length?'flex':'none';
      if(typingNames.length){
        const lbl=wrap.querySelector('div');
        if(lbl)lbl.textContent=typingNames.join(', ')+(typingNames.length>1?' are ':' is ')+'typing';
        const msgs=$('chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
      }
    });
  }catch(e){}
}

// ── READ RECEIPTS ─────────────────────────────────────────────
async function markMsgsRead(chatId,myUid){
  try{
    const q=fn().query(fn().collection(db(),`chats/${chatId}/messages`),fn().where('senderId','!=',myUid),fn().where('read','==',false));
    const snap=await fn().getDocs(q);
    await Promise.all(snap.docs.map(d=>fn().updateDoc(d.ref,{read:true})));
  }catch(e){}
}

// ── ENTER TO SEND ─────────────────────────────────────────────
function chatEnterSend(e,chatId,myUid,contactId,isGroup){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(chatId,myUid,contactId,isGroup);}
}

// ── ADMIN VIEW CHAT ───────────────────────────────────────────
async function adminViewChat(chatId,type='dm'){
  // highlight active
  document.querySelectorAll('.monitor-chat-item').forEach(i=>i.classList.remove('active'));

  function getUserName(uid){
    if(!uid)return'—';
    const u=userMap[uid];return u?u.name||u.email||uid.substring(0,8)+'…':uid.substring(0,8)+'…';
  }
  function getRoleBadge(uid){
    const u=userMap[uid];if(!u)return'';
    const cols={admin:'b-p',coordinatorhead:'b-o',coordinator:'b-b',trainer:'b-g',client:'b-y'};

    const files=msgs.filter(m=>['image','file'].includes(m.type)).length;
    const senders=[...new Set(msgs.map(m=>m.senderId).filter(Boolean))];

    // Message type classifier
    function getMsgFlag(m){

    if(type==='group'){
      const memberList=Object.entries(memberNames).map(([uid,name])=>`<span class="badge b-gray" style="font-size:10px">${name||uid.substring(0,6)}</span>`).join(' ');
      headerInfo=`<div style="font-size:11px;color:var(--muted);margin-top:3px">${memberIds.length} members · ${memberList}</div>`;
    }else{
      const pInfo=participants.map(uid=>`<span>${getUserName(uid)} ${getRoleBadge(uid)}</span>`).join(' <span style="color:var(--muted)">↔</span> ');
      headerInfo=`<div style="font-size:12px;margin-top:3px">${pInfo}</div>`;

        <div style="font-size:11px"><span style="color:var(--muted)">Participants:</span> <strong>${senders.length}</strong></div>

            </div>
            <div class="monitor-msg" style="background:${m.deleted?'rgba(255,68,68,.05)':'var(--card)'};border-color:${m.deleted?'rgba(255,68,68,.2)':'var(--border)'}">
              ${m.deleted?`<span style="color:var(--muted);font-style:italic">🚫 Message deleted</span>`

              :m.type==='file'&&m.fileUrl?`<div class="monitor-msg-file"><span style="font-size:18px">📎</span><div><div style="font-weight:600">${m.fileName||'File'}</div><div style="font-size:10px;opacity:.7">${m.fileSize?(m.fileSize/1024).toFixed(1)+'KB':''}</div></div><a href="${m.fileUrl}" target="_blank" style="color:var(--accent);font-size:12px;margin-left:auto">Open ↗</a></div><div style="font-size:12px;margin-top:4px">${m.message||''}</div>`

// ── MONITOR SEARCH ────────────────────────────────────────────
function toggleMonitorSearch(searchId){
  const el=document.getElementById(searchId);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function monitorSearchMessages(query,chatId,type){
  const safeId=chatId.replace(/[^a-z0-9]/gi,'');
  const resultsEl=document.getElementById(`monitor-search-results-${safeId}`);
  if(!resultsEl)return;
  const msgs=window._monitorCurrentMsgs||[];
  const q=query.toLowerCase().trim();
  if(!q){resultsEl.innerHTML='';return;}
  const matches=msgs.filter(m=>!m.deleted&&(m.message||'').toLowerCase().includes(q));
  if(!matches.length){resultsEl.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:6px">No results</div>`;return;}
  const userMap=window._monitorCurrentUserMap||{};
  function getName(uid){const u=userMap[uid];return u?u.name||u.email||uid.substring(0,8):'—';}
  const hl=s=>{const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(re,'<mark class="search-hl">$1</mark>');};
  resultsEl.innerHTML=matches.slice(0,15).map(m=>`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;margin-bottom:5px;cursor:pointer" onclick="scrollToMonitorMsg('${m.id}')">
      <div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px">${getName(m.senderId)} · ${m.timestamp?fmtFullTime(m.timestamp):''}</div>
      <div style="font-size:12px">${hl((m.message||'').substring(0,120))}</div>
    </div>`).join('');
}

function scrollToMonitorMsg(msgId){
  // find the msg in the monitor view by searching content — approximate scroll
  const msgs=$('monitor-msgs');if(!msgs)return;
  const allWraps=msgs.querySelectorAll('.monitor-msg-wrap');
  // try to find matching content
  msgs.scrollTop=msgs.scrollHeight;
}

// ── ADMIN CLEAR DM ────────────────────────────────────────────
async function adminClearDMChat(chatId){
  if(!confirm('⚠️ Permanently clear ALL messages in this conversation? This cannot be undone.'))return;
  try{
    const snap=await fn().getDocs(fn().collection(db(),`chats/${chatId}/messages`));
    await Promise.all(snap.docs.map(d=>fn().deleteDoc(d.ref)));
    toast('Chat cleared','success');
    // reload view
    const main=$('monitor-main');
    if(main)main.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px">Chat cleared successfully</div>`;
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── EXPORT CONVERSATION PDF ───────────────────────────────────
async function exportConvoPDF(chatId,type,titleStr){
  toast('Generating conversation PDF…','info');
  const collPath=type==='group'?`groupchats/${chatId}/messages`:`chats/${chatId}/messages`;
  const userMap=window._monitorUserMap||{};
  function getName(uid){const u=userMap[uid];return u?u.name||u.email||uid.substring(0,8):'—';}
  try{
    const snap=await fn().getDocs(fn().query(fn().collection(db(),collPath),fn().orderBy('timestamp','asc')));
    const msgs=[];snap.forEach(d=>msgs.push({id:d.id,...d.data()}));
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=doc.internal.pageSize.getWidth();
    const ph=doc.internal.pageSize.getHeight();
    let y=0;
    // Cover
    doc.setFillColor(11,11,11);doc.rect(0,0,pw,ph,'F');
    doc.setFillColor(212,255,0);doc.rect(0,0,4,ph,'F');
    doc.setTextColor(212,255,0);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text('GYM AT YOUR HOME™',pw/2,18,{align:'center'});
    doc.setTextColor(200,200,210);doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text('CHAT MONITOR — CONVERSATION EXPORT',pw/2,25,{align:'center'});
    doc.setFillColor(22,28,40);doc.roundedRect(10,32,pw-20,20,2,2,'F');
    doc.setTextColor(240,242,248);doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text(titleStr.substring(0,60),pw/2,42,{align:'center'});
    doc.setTextColor(160,168,185);doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(`${msgs.length} messages · Exported: ${new Date().toLocaleString('en-IN')} · By: ${CU.name||'Admin'}`,pw/2,48,{align:'center'});
    y=62;
    // Messages
    const roleColors={admin:[170,102,255],coordinatorhead:[255,140,0],coordinator:[77,159,255],trainer:[0,200,110],client:[255,187,0]};
    msgs.forEach((m,i)=>{
      if(y>ph-20){doc.addPage();doc.setFillColor(11,11,11);doc.rect(0,0,pw,ph,'F');doc.setFillColor(212,255,0);doc.rect(0,0,4,ph,'F');y=16;}
      const isSystem=m.senderId==='system'||m.type==='system';
      if(isSystem){
        doc.setFillColor(30,38,55);doc.roundedRect(20,y,pw-40,8,2,2,'F');
        doc.setTextColor(100,110,130);doc.setFontSize(7.5);doc.setFont('helvetica','italic');
        doc.text(m.message||'',pw/2,y+5.5,{align:'center'});y+=12;return;
      }
      const u=userMap[m.senderId];const name=getName(m.senderId);
      const ts=m.timestamp?fmtFullTime(m.timestamp):'—';
      const rc=roleColors[u?.role]||[136,136,136];
      const msgText=m.deleted?'[Deleted]':m.type==='image'?'[Image]':m.type==='file'?`[File: ${m.fileName||''}]`:(m.message||'');
      const lines=doc.splitTextToSize(msgText,pw-38);
      const bh=Math.max(lines.length*5.5+12,16);
      if(y+bh>ph-16){doc.addPage();doc.setFillColor(11,11,11);doc.rect(0,0,pw,ph,'F');doc.setFillColor(212,255,0);doc.rect(0,0,4,ph,'F');y=16;}
      doc.setFillColor(18,24,36);doc.roundedRect(6,y,pw-12,bh,2,2,'F');
      doc.setFillColor(...rc);doc.roundedRect(6,y,3,bh,1,1,'F');
      doc.setTextColor(...rc);doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.text(name,12,y+6);
      doc.setTextColor(100,110,130);doc.setFont('helvetica','normal');doc.text(ts,pw-10,y+6,{align:'right'});
      if(u?.role){doc.setTextColor(80,90,110);doc.text(u.role,12+doc.getTextWidth(name)+3,y+6);}
      doc.setTextColor(220,225,235);doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.text(lines,12,y+12);
      y+=bh+4;
    });
    // Footer
    const total=doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){
      doc.setPage(p);
      doc.setFillColor(16,20,30);doc.rect(0,ph-10,pw,10,'F');
      doc.setTextColor(90,100,118);doc.setFontSize(6);doc.setFont('helvetica','normal');
      doc.text('Gym At Your Home™ — Admin Chat Monitor Export — Confidential',6,ph-4);
      doc.setTextColor(212,255,0);doc.text(`${p}/${total}`,pw-6,ph-4,{align:'right'});
    }
    const safeName=titleStr.replace(/[^a-z0-9]/gi,'_').substring(0,30);
    doc.save(`GYH_Chat_${safeName}_${new Date().toISOString().split('T')[0]}.pdf`);
    toast('✅ Conversation exported!','success');
  }catch(e){toast('Export error: '+e.message,'error');}
}

async function saveCustomSlot(){
  const display=$('cs-display')?.value.trim();
  const period=$('cs-period')?.value;
  const time=$('cs-time')?.value;
  const cap=Number($('cs-cap')?.value)||10;
  const notes=$('cs-notes')?.value.trim()||'';
  const tgHint=$('cs-tgender-hint')?.value||'';
  const trainerSel=$('cs-trainer');
  const trainerId=trainerSel?.value||'';
  const trainerOpt=trainerSel?.selectedIndex>0?trainerSel.options[trainerSel.selectedIndex]:null;
  const trainerName=trainerOpt?trainerOpt.dataset.name||'':'';
  const trainerGender=trainerOpt?trainerOpt.dataset.gender||'':'';
  const errEl=$('cs-err');errEl.classList.remove('show');

  if(!display){errEl.textContent='Slot display name is required.';errEl.classList.add('show');return;}
  if(!period){errEl.textContent='Please select a period.';errEl.classList.add('show');return;}
  if(!time){errEl.textContent='Start time is required.';errEl.classList.add('show');return;}

  try{
    await fsAdd('slots',{
      isCustom:true,
      displayTime:display,
      slotTime:time,
      period,
      maxCapacity:cap,
      enrolledClients:[],
      enrolledCount:0,
      trainerId,
      trainerName,
      trainerGender,
      trainerGenderHint:tgHint,
      notes,
      createdBy:auth().currentUser.uid,
      createdByName:CU.name||'',
    });
    closeM1();
    toast('✅ Custom slot added!','success');
    slots();
  }catch(e){
    errEl.textContent='Error: '+e.message;errEl.classList.add('show');
  }
}

async function deleteCustomSlot(slotId){
  if(!confirm('Delete this custom slot? All bookings will be lost.'))return;
  try{
    await fsDel('slots',slotId);
    toast('Slot deleted','success');
    slots();
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── ENROLL (CLIENT) ──────────────────────────────────────────
async function enrollSlotClient(slotId,slotTime){
  const myUid=auth().currentUser.uid;
  try{
    const slotRef=fn().doc(db(),'slots',slotId);
    const snap=await fn().getDoc(slotRef);
    if(snap.exists()){
      const d=snap.data();
      const enrolled=d.enrolledClients||[];
      const cap=Number(d.maxCapacity)||10;
      if(enrolled.includes(myUid)){toast('Already booked!','info');return;}
      if(enrolled.length>=cap){toast('Slot is full!','error');return;}
      await fn().updateDoc(slotRef,{
        enrolledClients:[...enrolled,myUid],
        enrolledCount:enrolled.length+1,
        updatedAt:fn().serverTimestamp()
      });
    }else{
      await fn().setDoc(slotRef,{
        slotId,slotTime,
        enrolledClients:[myUid],enrolledCount:1,maxCapacity:10,
        trainerId:'',trainerName:'',trainerGender:'',
        createdAt:fn().serverTimestamp()
      });
    }
    toast(`✅ Booked: ${slotTime}`,'success');
    slots();
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── UNENROLL (CLIENT) ────────────────────────────────────────
async function unenrollSlotClient(slotId,slotTime){
  if(!confirm(`Unbook "${slotTime}"?`))return;
  const myUid=auth().currentUser.uid;
  try{
    const slotRef=fn().doc(db(),'slots',slotId);
    const snap=await fn().getDoc(slotRef);
    if(!snap.exists()){toast('Slot not found','error');return;}
    const d=snap.data();
    const enrolled=(d.enrolledClients||[]).filter(id=>id!==myUid);
    await fn().updateDoc(slotRef,{
      enrolledClients:enrolled,
      enrolledCount:enrolled.length,
      updatedAt:fn().serverTimestamp()
    });
    toast(`Unbooked: ${slotTime}`,'info');
    slots();
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── ADMIN REMOVE CLIENT FROM SLOT ────────────────────────────
async function adminRemoveFromSlot(slotId,uid,clientName,event){
  event&&event.stopPropagation();
  if(!confirm(`Remove "${clientName}" from this slot?`))return;
  try{
    const slotRef=fn().doc(db(),'slots',slotId);
    const snap=await fn().getDoc(slotRef);
    if(!snap.exists())return;
    const d=snap.data();
    const enrolled=(d.enrolledClients||[]).filter(id=>id!==uid);
    await fn().updateDoc(slotRef,{
      enrolledClients:enrolled,
      enrolledCount:enrolled.length,
      updatedAt:fn().serverTimestamp()
    });

}

      <button class="btn btn-p" onclick="saveSlotConfig('${slotId}','${slotTime.replace(/'/g,"\\'")}')">Save Slot</button>
    </div>`);
}

async function saveSlotConfig(slotId,slotTime){
  const trainerSel=$('ms-trainer');
  if(!trainerSel){toast('Form error','error');return;}
  const trainerId=trainerSel.value;
  const selectedOpt=trainerSel.options[trainerSel.selectedIndex];
  const trainerName=trainerId?selectedOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim():'';
  const trainerGender=trainerId?selectedOpt.dataset.gender||'':'';
  const cap=Number($('ms-cap').value)||10;
  const display=$('ms-display')?.value.trim()||slotTime;
  const period=$('ms-period')?.value||'Morning';
  const notes=$('ms-notes')?.value.trim()||'';
  const tgHint=$('ms-tgender-hint')?.value||'';

  try{
    const slotRef=fn().doc(db(),'slots',slotId);
    const snap=await fn().getDoc(slotRef);
    const existing=snap.exists()?snap.data():{};
    if(snap.exists()){
      await fn().updateDoc(slotRef,{
        trainerId,trainerName,trainerGender,
        maxCapacity:cap,slotTime,displayTime:display,
        period,notes,trainerGenderHint:tgHint,
        updatedAt:fn().serverTimestamp()
      });
    }else{
      await fn().setDoc(slotRef,{
        slotId,trainerId,trainerName,trainerGender,
        maxCapacity:cap,slotTime,displayTime:display,
        period,notes,trainerGenderHint:tgHint,
        enrolledClients:[],enrolledCount:0,
        isCustom:false,
        createdAt:fn().serverTimestamp()
      });
    }
    closeM2();toast('Slot saved!','success');slots();
  }catch(e){
    const errEl=$('ms-err');
    if(errEl){errEl.textContent='Error: '+e.message;errEl.classList.add('show');}
  }
}

async function setupDefaultSlots(){
  if(!confirm('This will create the 8 default fixed slots if they don\'t exist yet. Continue?'))return;
  const defaults=[
    {id:'s1',displayTime:'6:00 – 7:00 AM', slotTime:'06:00',period:'Morning',trainerGenderHint:''},
    {id:'s2',displayTime:'7:00 – 8:00 AM', slotTime:'07:00',period:'Morning',trainerGenderHint:'Female'},
    {id:'s3',displayTime:'8:00 – 9:00 AM', slotTime:'08:00',period:'Morning',trainerGenderHint:''},
    {id:'s4',displayTime:'9:00 – 10:00 AM',slotTime:'09:00',period:'Morning',trainerGenderHint:'Female'},
    {id:'s5',displayTime:'4:30 – 5:30 PM', slotTime:'16:30',period:'Evening',trainerGenderHint:'Female'},
    {id:'s6',displayTime:'5:30 – 6:30 PM', slotTime:'17:30',period:'Evening',trainerGenderHint:''},
    {id:'s7',displayTime:'6:30 – 7:30 PM', slotTime:'18:30',period:'Evening',trainerGenderHint:'Female'},
    {id:'s8',displayTime:'7:30 – 8:30 PM', slotTime:'19:30',period:'Evening',trainerGenderHint:''},

          trainerId:'',trainerName:'',trainerGender:'',
          trainerGenderHint:s.trainerGenderHint,notes:'',isCustom:false,
          createdAt:fn().serverTimestamp()

    }
    toast('✅ Default slots set up!','success');slots();
  }catch(e){toast('Error: '+e.message,'error');}

async function openEditBatch(id){
  const b=await fsGet('batches',id);if(!b){toast('Not found','error');return}
  const trainers=await fsGetAll('users',fn().where('role','==','trainer'));
  openM1('EDIT PROGRAM',`
    <div class="fg"><label class="fl">Program Name *</label><input class="fi" id="bf-name" value="${b.batchName||''}"></div>
    <div class="fg"><label class="fl">Assign Trainer</label><select class="fs" id="bf-trainer"><option value="">— Select —</option>${trainers.map(t=>`<option value="${t.id}" data-gender="${t.gender||''}" ${b.trainerId===t.id?'selected':''}>${t.name||t.email} (${t.gender||'Any'})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Session Type</label><select class="fs" id="bf-stype">${SESSION_TYPES.map(t=>`<option ${b.sessionType===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Schedule</label><input class="fi" id="bf-schedule" value="${b.schedule||''}"></div>
    <div class="fg"><label class="fl">Max Capacity</label><input class="fi" id="bf-cap" type="number" value="${b.maxCapacity||10}"></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveBatch('${id}')">Update</button></div>`);

async function saveBatch(existingId=''){
  const nameEl=document.getElementById('bf-name');const name=nameEl?nameEl.value.trim():'';
  if(!name){toast('Program name required','error');return}
  const trainerSel=$('bf-trainer');const trainerId=trainerSel?trainerSel.value:'';
  const trainerOpt=trainerSel&&trainerSel.selectedIndex>0?trainerSel.options[trainerSel.selectedIndex]:null;
  const trainerName=trainerOpt?trainerOpt.text.replace(/\s*\([^)]*\)\s*$/,'').trim():'';
  const schedule=document.getElementById('bf-schedule')?.value.trim()||'';
  const maxCap=Number(document.getElementById('bf-cap')?.value)||10;
  const sessionType=document.getElementById('bf-stype')?.value||'Corporate Fitness';
  const plan=document.getElementById('bf-plan')?.value||'';
  const company=document.getElementById('bf-company')?.value.trim()||'';
  const clientsSel=document.getElementById('bf-clients');
  const preEnrolled=clientsSel?Array.from(clientsSel.selectedOptions).map(o=>o.value).filter(v=>v):[];
  const existingBatch=existingId?await fsGet('batches',existingId):null;
  const mergedEnrolled=[...new Set([...(existingBatch?.enrolledClients||[]),...preEnrolled])];
  const data={batchName:name,trainerId,trainerName,sessionType,schedule,maxCapacity:maxCap,company,plan,enrolledClients:mergedEnrolled};
  try{
    if(existingId){await fsUpdate('batches',existingId,data);toast('Updated!','success');closeM1()}
    else{await fsAdd('batches',data);toast('Created!','success');closeM2()}
    batches();
  }catch(e){toast('Error: '+e.message,'error')}
}
async function addClientToBatch(batchId,batchName){
  const clients=await fsGetAll('clients',fn().where('active','==',true));
  const b=await fsGet('batches',batchId);const already=b?.enrolledClients||[];
  const available=clients.filter(c=>!already.includes(c.id));
  openM1(`ADD CLIENT TO: ${batchName.toUpperCase()}`,`
    <div class="fg"><label class="fl">Select Client *</label><select class="fs" id="atb-client"><option value="">— Select —</option>${available.map(c=>`<option value="${c.id}">${c.name} (${c.plan||'—'})</option>`).join('')}</select></div>
    <div class="mo-foot"><button class="btn btn-g" onclick="closeM1()">Cancel</button><button class="btn btn-p" onclick="saveAddClientToBatch('${batchId}')">Add</button></div>`);
}
async function saveAddClientToBatch(batchId){
  const clientSel=$('atb-client');const clientId=clientSel.value;
  if(!clientId){toast('Select a client','error');return}
  try{const b=await fsGet('batches',batchId);const enrolled=b?.enrolledClients||[];if(enrolled.includes(clientId)){toast('Already enrolled','info');return}if(enrolled.length>=(b?.maxCapacity||10)){toast('At max capacity','error');return}await fn().updateDoc(fn().doc(db(),'batches',batchId),{enrolledClients:[...enrolled,clientId]});closeM1();toast('Client added!','success');batches()}catch(e){toast('Error: '+e.message,'error')}
}
async function delBatch(id){if(!confirm('Delete?'))return;try{await fsDel('batches',id);toast('Deleted','success');batches()}catch(e){toast('Error','error')}}

// ── BADGE HELPERS ─────────────────────────────────────────────
function statusBadge(s){
  const map={onair:`<span class="badge b-g"><span class="dot dot-g"></span>On Air</span>`,'not-started':`<span class="badge b-y"><span class="dot dot-y"></span>Pending</span>`,missed:`<span class="badge b-r"><span class="dot dot-r"></span>Missed</span>`,completed:`<span class="badge b-gray">✓ Done</span>`,present:`<span class="badge b-g">✅ Present</span>`,absent:`<span class="badge b-r">❌ Absent</span>`,late:`<span class="badge b-y">⏰ Late</span>`};
  return map[s]||`<span class="badge b-gray">${s||'—'}</span>`;
}
function planBadge(p){
  if(!p)return`<span class="badge b-gray">—</span>`;
  if(p==='Gold')return`<span class="badge b-y">🥇 Gold</span>`;
  if(p==='Platinum')return`<span class="badge b-p">💎 Platinum</span>`;
  if(p==='Platinum Plus')return`<span class="badge b-p">💎+ Plat+</span>`;
  if(p==='Corporate Fitness')return`<span class="badge b-b">🏢 Corporate</span>`;
  return`<span class="badge b-gray">🥈 Silver</span>`;
}

document.addEventListener('fbReady',()=>{
  initTheme();
  const{onAuthStateChanged}=window.FN;

    await new Promise(r=>setTimeout(r,1600));
    $('loader').classList.add('out');
    if(user){
      try{
        const uDoc=await fsGet('users',user.uid);
        if(uDoc&&uDoc.role){CU=uDoc;CR=uDoc.role;startApp()}
        else{await window.FN.signOut(window.FB.auth);$('login-page').style.display='flex'}
      }catch(e){$('login-page').style.display='flex'}
    }else{$('login-page').style.display='flex'}
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login-page').style.display==='flex')doLogin()});
